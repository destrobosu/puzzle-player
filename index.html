function confirmResetBoard() {
  if (!originalBoard.length) return;
  const hasRewards = currentBoardFile && grantedRewards[currentBoardFile];
  if (hasRewards) {
    // Show warning dialog
    document.querySelectorAll('.next-level-overlay,.next-level-notify').forEach(el => el.remove());
    const overlay = document.createElement('div');
    overlay.className = 'next-level-overlay';
    const notify = document.createElement('div');
    notify.className = 'next-level-notify';
    notify.innerHTML = '<div class="notify-title" style="color:var(--color-danger)">Reset Level?</div>' +
      '<div class="notify-msg">Rewards earned from this level will be removed. Pieces used on other boards may also be affected.</div>' +
      '<div class="notify-buttons">' +
      '<button class="notify-btn" style="background:var(--color-danger);color:var(--color-text-primary)" data-action="confirm">Reset</button>' +
      '<button class="notify-btn notify-btn-neutral" data-action="cancel">Cancel</button>' +
      '</div>';
    document.body.appendChild(overlay);
    document.body.appendChild(notify);
    requestAnimationFrame(() => { overlay.classList.add('show'); notify.classList.add('show'); });
    const dismiss = () => { overlay.classList.remove('show'); notify.classList.remove('show'); setTimeout(() => { overlay.remove(); notify.remove(); }, 200); };
    notify.querySelector('[data-action="confirm"]').addEventListener('click', () => { dismiss(); resetBoard(); });
    notify.querySelector('[data-action="cancel"]').addEventListener('click', dismiss);
    overlay.addEventListener('click', dismiss);
  } else {
    resetBoard();
  }
}

function resetBoard() {
  if (!originalBoard.length) return;
  // Return all player pieces on this board to inventory (original variant if rotated)
  for (let r=0; r<boardSize; r++) for (let c=0; c<boardSize; c++) {
    const cell = boardState[r][c];
    const key = r+','+c;
    if (cell && cell.type === 'piece' && cell.variant) {
      returnPiece(rotatedPieces[key] || cell.variant);
    }
  }
  boardState = originalBoard.map(row => row.map(cell => cell ? {...cell} : null));
  history = [];
  powerUpLinks = {};
  rotatedPieces = {};
  if (currentBoardFile) {
    refundBoardPowerUps(currentBoardFile);
    delete boardPlacements[currentBoardFile]; delete boardRotations[currentBoardFile];
    // Remove rewards and un-complete this level
    if (grantedRewards[currentBoardFile]) {
      (grantedRewards[currentBoardFile].pieces || grantedRewards[currentBoardFile] || []).forEach(r => { inventory[r.variant] -= r.count; });
      delete grantedRewards[currentBoardFile];
      uncompleteLevel(currentBoardFile);
      // Cascade: fix negative inventory, check other boards
      cascadeRewardRemoval(currentBoardFile);
    }
    // Remove MEM score and stars for this board
    const memData = JSON.parse(localStorage.getItem('puzzle-board-mem') || '{}');
    delete memData[currentBoardFile];
    localStorage.setItem('puzzle-board-mem', JSON.stringify(memData));
    clearBoardStars(currentBoardFile);
    saveBoardPlacements();
  }
  if (PowerUpManager.isActive()) PowerUpManager.cancel();
  renderBoard(); updateStatus(); checkStars(); updateInventoryUI(); updatePowerUpUI();
  document.getElementById('win-banner').innerHTML = '';
}

// === RENDER ===
function renderBoard() {
  const board = document.getElementById('board');
  // Dynamic cell size: fit board within viewport width AND height
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const isMobile = vw <= 600;
  const wrapPadding = isMobile ? 20 : 32;
  // Width constraint
  const maxWidth = Math.min(vw - 40, 400);
  const cellFromWidth = Math.floor((maxWidth - (boardSize - 1) * cellGap - 4) / boardSize);
  // Height constraint: reserve space for UI above and below the board
  const uiAbove = isMobile ? 130 : 130; // top bar, info panel, gaps
  const uiBelow = isMobile ? 200 : 120; // inventory panel, browser chrome, margins
  const availHeight = vh - uiAbove - uiBelow - wrapPadding * 2;
  const cellFromHeight = Math.floor((availHeight - (boardSize - 1) * cellGap - 4) / boardSize);
  cellSize = Math.min(56, Math.max(28, Math.min(cellFromWidth, cellFromHeight)));
  board.style.gridTemplateColumns = `repeat(${boardSize}, ${cellSize}px)`;
  board.style.gap = cellGap + 'px';
  document.getElementById('board-wrapper').style.padding = wrapPadding + 'px';
  board.innerHTML = '';
  const connectedCells = getConnectedCells();
  const connectedSides = getConnectedSides();

  for (let r=0; r<boardSize; r++) for (let c=0; c<boardSize; c++) {
    const cell = document.createElement('div');
    cell.className = 'cell'; cell.dataset.row=r; cell.dataset.col=c;
    cell.style.width = cellSize + 'px'; cell.style.height = cellSize + 'px';
    const state = boardState[r][c];

    if (state) {
      if (state.type==='obstacle') cell.classList.add('obstacle');
      else if (state.variant && PIECE_SVGS[state.variant]) { cell.classList.add('filled','cell-svg'); cell.innerHTML=PIECE_SVGS[state.variant]; }
      else cell.classList.add('filled','color-'+(state.color||'white'));
    }

    const cellKey = `${r},${c}`;
    // Connection light overlay
    if (connectedSides[cellKey] && connectedSides[cellKey].size > 0) {
      const variant = state?.variant || '';
      const lightSvg = buildConnectionLight(connectedSides[cellKey], variant);
      const overlay = document.createElement('div');
      overlay.className = 'conn-light';
      overlay.innerHTML = lightSvg;
      cell.appendChild(overlay);
    }
    // Red glow on rotated pieces
    if (rotatedPieces[cellKey]) cell.classList.add('cell-rotated');

    PowerUpManager.renderCell(cell, r, c);

    // Drag from board
    cell.addEventListener('mousedown', e => {
      if (e.button!==0) return;
      if (state && state.type==='piece') {
        e.preventDefault();
        startDragFromBoard(state, r, c, e.clientX, e.clientY);
      }
    });
    cell.addEventListener('touchstart', e => {
      if (state && state.type==='piece') {
        e.preventDefault(); document.body.style.overflow='hidden';
        const {x,y}=getEventXY(e); startDragFromBoard(state, r, c, x, y);
      }
    }, {passive:false});

    // Right-click to remove player pieces only
    cell.addEventListener('contextmenu', e => {
      e.preventDefault();
      if (state && state.type==='piece') {
        xpDropTarget={row:r,col:c,variant:state.variant};
        removePieceWithLinks(r, c);
        renderBoard(); updateStatus(); checkStars();
      }
    });

    board.appendChild(cell);
  }

  // Add IN/OUT arrow labels outside the board for entry/exit pieces
  const wrapper = document.getElementById('board-wrapper');
  wrapper.querySelectorAll('.board-label').forEach(l => l.remove());
  const cellStep = cellSize + cellGap;
  const pad = 2; // board padding
  for (let r=0; r<boardSize; r++) for (let c=0; c<boardSize; c++) {
    const s = boardState[r][c];
    if (!s || (s.type !== 'entry' && s.type !== 'exit')) continue;
    const opening = ENTRY_EXIT_OPENING[s.variant];
    if (!opening) continue;
    const isEntry = s.type === 'entry';
    const wrapPad = wrapPadding;
    const cellLeft = wrapPad + pad + c * cellStep;
    const cellTop = wrapPad + pad + r * cellStep;

    const label = document.createElement('div');
    label.className = 'board-label ' + (isEntry ? 'label-in' : 'label-out') + ' label-side-' + opening;
    label.innerHTML = '<span class="label-arrow">' + (ES_SVGS[opening] || '') + '</span>';
    if (opening === 'T') {
      label.style.left = cellLeft + 'px'; label.style.width = cellSize + 'px'; label.style.bottom = 'calc(100% - ' + (wrapPad - 4) + 'px)';
    } else if (opening === 'B') {
      label.style.left = cellLeft + 'px'; label.style.width = cellSize + 'px'; label.style.top = 'calc(100% - ' + (wrapPad - 4) + 'px)';
    } else if (opening === 'L') {
      label.style.top = cellTop + 'px'; label.style.height = cellSize + 'px'; label.style.right = 'calc(100% - ' + (wrapPad - 4) + 'px)';
    } else if (opening === 'R') {
      label.style.top = cellTop + 'px'; label.style.height = cellSize + 'px'; label.style.left = 'calc(100% - ' + (wrapPad - 4) + 'px)';
    }
    wrapper.appendChild(label);
  }
}

function getCellAt(x, y) {
  const board = document.getElementById('board');
  const rect = board.getBoundingClientRect();
  const step = cellSize + cellGap;
  const col = Math.floor((x-rect.left-2)/step);
  const row = Math.floor((y-rect.top-2)/step);
  return (row>=0&&row<boardSize&&col>=0&&col<boardSize) ? {row,col} : null;
}

function canDrop(row, col, color) {
  const cur = boardState[row][col];
  // Red (Breaker) can ONLY be placed on obstacles
  if (color === 'red') return !!(cur && cur.type === 'obstacle');
  // Nothing can replace a Mythic piece — must remove it first
  if (cur && cur.variant === 'red') return false;
  // Normal pieces cannot go on obstacles or locked pieces
  if (cur && cur.type==='obstacle') return false;
  if (cur && (cur.type==='preset'||cur.type==='entry'||cur.type==='exit')) return false;
  return true;
}

function undoLast() {
  if (!history.length) return;
  const last = history.pop();
  boardState[last.row][last.col] = last.prev;
  renderBoard(); updateStatus(); checkStars();
}

// Minimum path score for current board (set on load)
let minPathScore = 0;

// Find cheapest piece variant for a set of required connectors
function cheapestPieceForPath(needed) {
  const variants = [
    ['green',['T','B']],['green2',['L','R']],
    ['blue',['L','T']],['blue2',['T','R']],['blue3',['R','B']],['blue4',['B','L']],
    ['purple',['T','L','R']],['purple2',['T','R','B']],['purple3',['B','L','R']],['purple4',['T','B','L']],
    ['orange',['T','R','B','L']]
  ];
  for (const [v, dirs] of variants) {
    if (needed.every(d => dirs.includes(d))) return v;
  }
  return 'orange';
}

// Calculate minPathScore for the ORIGINAL board (no player pieces)
function calcMinPathScore() {
  if (!originalBoard.length) { minPathScore = 0; return; }
  const s = boardSize;
  const board = originalBoard;
  let entry = null, exit = null;
  for (let r=0;r<s;r++) for (let c=0;c<s;c++) {
    const cell = board[r]?.[c];
    if (cell?.type === 'entry') entry = {r,c,variant:cell.variant};
    if (cell?.type === 'exit') exit = {r,c,variant:cell.variant};
  }
  if (!entry || !exit) { minPathScore = 0; return; }

  // BFS with parent tracking (empty cells = all dirs, placed pieces use their connectors)
  const visited = Array.from({length:s},()=>Array(s).fill(false));
  const parent = Array.from({length:s},()=>Array(s).fill(null));
  const queue = [{r:entry.r,c:entry.c}]; visited[entry.r][entry.c] = true;
  while (queue.length) {
    const {r,c} = queue.shift();
    if (r===exit.r && c===exit.c) break;
    const cell = board[r]?.[c];
    let dirs;
    if (cell && cell.variant && CONNECTORS[cell.variant]) dirs = CONNECTORS[cell.variant];
    else if (!cell) dirs = ['T','B','L','R'];
    else continue;
    for (const dir of dirs) {
      const dr=dir==='T'?-1:dir==='B'?1:0, dc=dir==='L'?-1:dir==='R'?1:0;
      const nr=r+dr, nc=c+dc;
      if (nr<0||nr>=s||nc<0||nc>=s||visited[nr][nc]) continue;
      const n=board[nr]?.[nc];
      if (n && n.type==='obstacle') continue;
      if (n && n.variant && CONNECTORS[n.variant] && !CONNECTORS[n.variant].includes(OPPOSITE[dir])) continue;
      visited[nr][nc]=true; parent[nr][nc]={r,c,dir}; queue.push({r:nr,c:nc});
    }
  }
  if (!visited[exit.r][exit.c]) { minPathScore = 0; return; }

  // Trace path, sum cheapest pieces for empty cells
  const path = [];
  let cur = {r:exit.r,c:exit.c};
  while (cur) { path.unshift(cur); const p=parent[cur.r][cur.c]; cur=p?{r:p.r,c:p.c}:null; }
  let score = 0;
  for (let i=0; i<path.length; i++) {
    const {r,c} = path[i];
    if (board[r]?.[c]) continue; // skip entry/exit/preset
    const needed = [];
    if (i>0) { const prev=path[i-1]; needed.push(prev.r<r?'T':prev.r>r?'B':prev.c<c?'L':'R'); }
    if (i<path.length-1) { const next=path[i+1]; needed.push(next.r<r?'T':next.r>r?'B':next.c<c?'L':'R'); }
    const v = cheapestPieceForPath(needed);
    score += PIECE_POINTS[v] || 10;
  }
  minPathScore = score;
}

// Bonuses by board size
const FULL_BOARD_BONUS = { 3:25, 4:50, 5:75, 6:100 };
const PERFECT_BONUS = { 3:50, 4:100, 5:150, 6:200 };

function calculateScore() {
  const connected = getConnectedCells();
  const connectedSides = getConnectedSides();
  // Collect all power-up generated cell keys
  const puGenerated = new Set();
  for (const links of Object.values(powerUpLinks)) {
    for (const key of links) puGenerated.add(key);
  }

  let pathScore = 0, disconnectedScore = 0, comboScore = 0;
  for (let r=0; r<boardSize; r++) for (let c=0; c<boardSize; c++) {
    const cell = boardState[r][c];
    if (!cell || cell.type !== 'piece') continue;
    const key = r+','+c;
    if (puGenerated.has(key)) continue; // power-up generated pieces score 0
    const pts = PIECE_POINTS[cell.variant] || 0;
    if (connected.has(key)) {
      pathScore += pts;
      // Combo bonus: +15 per active connection on 3+ connector pieces
      const cellConns = CONNECTORS[cell.variant];
      if (cellConns && cellConns.length >= 3 && connectedSides[key]) {
        comboScore += connectedSides[key].size * 15;
      }
    } else {
      disconnectedScore += Math.floor(pts * 0.5);
    }
  }

  // Board-level bonuses
  const total = boardSize*boardSize;
  const filled = boardState.flat().filter(c=>c!==null).length;
  const allFilled = filled === total;
  const obstacles = boardState.flat().filter(c=>c&&c.type==='obstacle').length;
  const allConnected = allFilled && getConnectedCells().size === filled - obstacles;
  const fullBoardBonus = allFilled ? (FULL_BOARD_BONUS[boardSize] || 0) : 0;
  const perfectBonus = (allFilled && allConnected) ? (PERFECT_BONUS[boardSize] || 0) : 0;

  const totalScore = pathScore + disconnectedScore + comboScore + fullBoardBonus + perfectBonus;
  return { total: totalScore, pathScore, disconnectedScore, comboScore, fullBoardBonus, perfectBonus };
}

let lastScore = 0;
let xpDropTarget = null; // { row, col, variant } — set before updateStatus() to position the drop

function updateStatus() {
  const scoreData = calculateScore();
  const delta = scoreData.total - lastScore;
  const memEl = document.getElementById('stat-mem');
  memEl.textContent = 'MEM: ' + scoreData.total;

  if (delta !== 0 && lastScore !== 0) {
    // MEM counter punch
    memEl.classList.remove('mem-punch');
    void memEl.offsetWidth;
    memEl.classList.add('mem-punch');

    // XP drop at piece location
    if (xpDropTarget) {
      showXpDrop(xpDropTarget.row, xpDropTarget.col, delta, xpDropTarget.variant);
      // Piece snap on placement (positive delta = piece placed)
      if (delta > 0) { snapPieceAt(xpDropTarget.row, xpDropTarget.col); SoundManager.place(); }
      xpDropTarget = null;
    }
  }
  lastScore = scoreData.total;
  // Connection sparks for newly connected pieces
  showConnectionSparks();
}

function showXpDrop(row, col, delta, variant) {
  const board = document.getElementById('board');
  const cells = board.querySelectorAll('.cell');
  const idx = row * boardSize + col;
  const cell = cells[idx];
  if (!cell) return;
  const rect = cell.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  const y = rect.top;

  const el = document.createElement('div');
  el.className = 'xp-drop';
  el.textContent = (delta > 0 ? '+' : '') + delta;

  // Color by rarity or red for loss
  if (delta < 0) {
    el.style.color = 'var(--color-danger)';
  } else {
    const rarity = PIECE_RARITY[variant] || 'Common';
    const colors = { Common: '#4CAF50', Rare: '#2196F3', Epic: '#9C27B0', Legendary: '#FF9800', Mythic: '#EC221F' };
    el.style.color = colors[rarity] || 'var(--color-text-primary)';
  }
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.transform = 'translateX(-50%)';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function celebrateStar(id) {
  SoundManager.star();
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('star-celebrate');
  void el.offsetWidth;
  el.classList.add('star-celebrate');
  el.addEventListener('animationend', () => el.classList.remove('star-celebrate'), { once: true });
}

function pulseEntryExit() {
  document.querySelectorAll('.board-label').forEach(label => {
    label.classList.remove('path-connected');
    void label.offsetWidth;
    label.classList.add('path-connected');
    label.addEventListener('animationend', () => label.classList.remove('path-connected'), { once: true });
  });
}

function snapPieceAt(row, col) {
  const board = document.getElementById('board');
  const cells = board.querySelectorAll('.cell');
  const cell = cells[row * boardSize + col];
  if (!cell) return;
  cell.classList.add('cell-snap');
  cell.addEventListener('animationend', () => cell.classList.remove('cell-snap'), { once: true });
}

let prevConnectedKeys = new Set();
function showConnectionSparks() {
  const currentConnected = getConnectedCells();
  const board = document.getElementById('board');
  const cells = board.querySelectorAll('.cell');
  // Find newly connected cells
  let hasNewConn = false;
  currentConnected.forEach(key => {
    if (!prevConnectedKeys.has(key)) {
      hasNewConn = true;
      const [r, c] = key.split(',').map(Number);
      const cell = cells[r * boardSize + c];
      if (!cell) return;
      const spark = document.createElement('div');
      spark.className = 'conn-spark';
      const size = Math.round(cellSize * 0.7);
      spark.style.width = size + 'px';
      spark.style.height = size + 'px';
      spark.style.left = (cellSize - size) / 2 + 'px';
      spark.style.top = (cellSize - size) / 2 + 'px';
      cell.appendChild(spark);
      spark.addEventListener('animationend', () => spark.remove());
    }
  });
  if (hasNewConn) SoundManager.connect();
  prevConnectedKeys = currentConnected;
}

// === 3-STAR WIN SYSTEM ===
function findPath() {
  let entry=null, exit=null;
  for (let r=0;r<boardSize;r++) for (let c=0;c<boardSize;c++) {
    const s=boardState[r][c]; if (!s) continue;
    if (s.type==='entry') entry={r,c}; if (s.type==='exit') exit={r,c};
  }
  if (!entry||!exit) return false;
  // BFS through connected pieces only
  const visited = Array.from({length:boardSize},()=>Array(boardSize).fill(false));
  const queue = [{r:entry.r,c:entry.c}]; visited[entry.r][entry.c]=true;
  while (queue.length) {
    const {r,c} = queue.shift();
    if (r===exit.r&&c===exit.c) return true;
    const cell = boardState[r][c]; if (!cell||!cell.variant) continue;
    const sides = CONNECTORS[cell.variant]; if (!sides) continue;
    for (const dir of sides) {
      const [dr,dc]=DIR_DELTA[dir]; const nr=r+dr,nc=c+dc;
      if (nr<0||nr>=boardSize||nc<0||nc>=boardSize||visited[nr][nc]) continue;
      const n=boardState[nr][nc]; if (!n||!n.variant) continue;
      const ns=CONNECTORS[n.variant]; if (!ns||!ns.includes(OPPOSITE[dir])) continue;
      visited[nr][nc]=true; queue.push({r:nr,c:nc});
    }
  }
  return false;
}

// Standalone path check on arbitrary board state (for cascade checking)
function findPathOnState(state, size) {
  let entry=null, exit=null;
  for (let r=0;r<size;r++) for (let c=0;c<size;c++) {
    const s=state[r][c]; if (!s) continue;
    if (s.type==='entry') entry={r,c}; if (s.type==='exit') exit={r,c};
  }
  if (!entry||!exit) return false;
  const visited = Array.from({length:size},()=>Array(size).fill(false));
  const queue = [{r:entry.r,c:entry.c}]; visited[entry.r][entry.c]=true;
  while (queue.length) {
    const {r,c} = queue.shift();
    if (r===exit.r&&c===exit.c) return true;
    const cell = state[r][c]; if (!cell||!cell.variant) continue;
    const sides = CONNECTORS[cell.variant]; if (!sides) continue;
    for (const dir of sides) {
      const [dr,dc]=DIR_DELTA[dir]; const nr=r+dr,nc=c+dc;
      if (nr<0||nr>=size||nc<0||nc>=size||visited[nr][nc]) continue;
      const n=state[nr][nc]; if (!n||!n.variant) continue;
      const ns=CONNECTORS[n.variant]; if (!ns||!ns.includes(OPPOSITE[dir])) continue;
      visited[nr][nc]=true; queue.push({r:nr,c:nc});
    }
  }
  return false;
}

function checkStars() {
  const total = boardSize*boardSize;
  const obstacles = boardState.flat().filter(c=>c&&c.type==='obstacle').length;
  const filled = boardState.flat().filter(c=>c!==null).length;
  const allFilled = filled === total;
  const pathExists = findPath();
  const allConnected = allFilled && getConnectedCells().size === filled - obstacles;
  const scoreData = calculateScore();

  // Star 1: IN→OUT path connected
  const s1 = pathExists;
  // Star 2: path connected AND score exceeds minimum path score
  const s2 = pathExists && scoreData.total > minPathScore;
  // Star 3: all cells filled AND all pieces connected
  const s3 = allFilled && allConnected;

  const prevS1 = document.getElementById('star1').classList.contains('earned');
  const prevS2 = document.getElementById('star2').classList.contains('earned');
  const prevS3 = document.getElementById('star3').classList.contains('earned');
  document.getElementById('star1').className = 'star' + (s1 ? ' earned' : '');
  document.getElementById('star2').className = 'star' + (s2 ? ' earned' : '');
  document.getElementById('star3').className = 'star' + (s3 ? ' earned' : '');
  // Celebrate newly earned stars
  if (s1 && !prevS1) { celebrateStar('star1'); pulseEntryExit(); }
  if (s2 && !prevS2) celebrateStar('star2');
  if (s3 && !prevS3) celebrateStar('star3');

  const stars = (s1?1:0)+(s2?1:0)+(s3?1:0);

  // Hidden 4th bonus: all cells filled + connected INCLUDING obstacles (mythic on every obstacle)
  const origObstacles = originalBoard.flat().filter(c => c && c.type === 'obstacle').length;
  const mythicOnObstacles = boardState.flat().filter(c => c && c.variant === 'red').length;
  const hiddenBonus = s3 && origObstacles > 0 && mythicOnObstacles >= origObstacles;

  // Save star count and check level unlocks
  if (currentBoardFile && stars > 0) {
    const prevStars = getBoardStars(currentBoardFile);
    saveBoardStars(currentBoardFile, stars);
    if (s1) markLevelCompleted(currentBoardFile);
    if (stars > prevStars) {
      const idx = BOARDS.findIndex(b => b.file === currentBoardFile);
      if (idx >= 0) {
        saveBoardMem(currentBoardFile, scoreData.total);
        showNextLevelNotification(idx, getTotalStars(), scoreData.total);
      }
    }
  }
  if (hiddenBonus) document.getElementById('win-banner').innerHTML = '<div class="win-banner" style="color:var(--color-brand-yellow)">Absolute Clear! ' + scoreData.total + ' MEM</div>';
  else if (stars === 3) document.getElementById('win-banner').innerHTML = '<div class="win-banner">Perfect! ' + scoreData.total + ' MEM</div>';
  else if (stars > 0) document.getElementById('win-banner').innerHTML = '<div class="win-banner">' + stars + ' Star' + (stars>1?'s':'') + ' — ' + scoreData.total + ' MEM</div>';
  else document.getElementById('win-banner').innerHTML = '';
}

// === DRAG & DROP ===
document.querySelectorAll('.palette-item, .powerup-item').forEach(item => {
  item.addEventListener('mousedown', e => {
    if (e.button!==0) return; e.preventDefault();
    startDragFromPalette(item.dataset.color, e.clientX, e.clientY);
  });
  item.addEventListener('touchstart', e => {
    e.preventDefault(); document.body.style.overflow='hidden';
    const {x,y}=getEventXY(e); startDragFromPalette(item.dataset.color, x, y);
  }, {passive:false});
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  ghost.style.left=e.clientX+'px'; ghost.style.top=e.clientY+'px';
  document.querySelectorAll('.drop-valid,.drop-invalid').forEach(c=>c.classList.remove('drop-valid','drop-invalid'));
  const target = getCellAt(e.clientX,e.clientY);
  if (target) {
    const idx=target.row*boardSize+target.col;
    const cells=document.querySelectorAll('#board .cell');
    if (cells[idx]) cells[idx].classList.add(canDrop(target.row,target.col,dragColor)?'drop-valid':'drop-invalid');
  }
});

document.addEventListener('mouseup', e => {
  if (!dragging) return;
  ghost.style.display='none';
  document.querySelectorAll('.drop-valid,.drop-invalid').forEach(c=>c.classList.remove('drop-valid','drop-invalid'));
  const target = getCellAt(e.clientX,e.clientY);

  if (dragSource) {
    // Board-to-board drag
    const sameCell = target&&target.row===dragSource.row&&target.col===dragSource.col;
    if (target&&!sameCell&&canDrop(target.row,target.col,dragColor)) {
      const srcKey=dragSource.row+','+dragSource.col;
      const srcPrev=boardState[dragSource.row][dragSource.col];
      history.push({row:dragSource.row,col:dragSource.col,prev:srcPrev});
      boardState[dragSource.row][dragSource.col]=null;
      history.push({row:target.row,col:target.col,prev:boardState[target.row][target.col]});
      const colorMap={green2:'green',blue2:'blue',blue3:'blue',blue4:'blue',purple2:'purple',purple3:'purple',purple4:'purple'};
      const variant = PIECE_SVGS[dragColor] ? dragColor : null;
      const boardColor = colorMap[dragColor]||dragColor;
      boardState[target.row][target.col]={type:'piece',color:boardColor,variant};
      // Transfer rotation tracking to new cell
      const tgtKey=target.row+','+target.col;
      if (rotatedPieces[srcKey]) { rotatedPieces[tgtKey]=rotatedPieces[srcKey]; delete rotatedPieces[srcKey]; }
      xpDropTarget={row:target.row,col:target.col,variant};
      renderBoard(); updateStatus(); checkStars();
    } else if (!target) {
      xpDropTarget={row:dragSource.row,col:dragSource.col,variant:dragColor};
      removePieceWithLinks(dragSource.row, dragSource.col);
      renderBoard(); updateStatus(); checkStars();
    }
  } else if (powerUpMap[dragColor]) {
    if (target) { const pu=powerUpMap[dragColor]; if (pu.canActivate(target)) PowerUpManager.activate(pu,target); }
  } else {
    // Palette to board — consume from inventory
    if (target && !canDrop(target.row,target.col,dragColor)) SoundManager.error();
    if (target&&canDrop(target.row,target.col,dragColor)&&consumePiece(dragColor)) {
      const colorMap={green2:'green',blue2:'blue',blue3:'blue',blue4:'blue',purple2:'purple',purple3:'purple',purple4:'purple'};
      const variant = PIECE_SVGS[dragColor] ? dragColor : null;
      const boardColor = colorMap[dragColor]||dragColor;
      history.push({row:target.row,col:target.col,prev:boardState[target.row][target.col]});
      boardState[target.row][target.col]={type:'piece',color:boardColor,variant};
      xpDropTarget={row:target.row,col:target.col,variant};
      saveCurrentBoard(); updateInventoryUI();
      renderBoard(); updateStatus(); checkStars();
    }
  }
  clearPowerUpHints(); dragging=false; dragColor=null; dragSource=null;
});

// === TOUCH SUPPORT ===
function getEventXY(e) {
  if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function startDragFromPalette(color, x, y) {
  // Block if piece is depleted (not power-ups)
  if (!powerUpMap[color] && inventory.hasOwnProperty(color) && inventory[color] <= 0) return;
  // Block if power-up is used up
  if (powerUpMap[color] && powerUpUses[color] >= POWERUP_MAX) return;
  dragColor = color; dragSource = null; dragging = true;
  if (PIECE_SVGS[color]) { ghost.className='drag-ghost ghost-svg'; ghost.innerHTML=PIECE_SVGS[color]; }
  else { ghost.className='drag-ghost'; ghost.innerHTML=''; }
  ghost.style.display='block'; ghost.style.left=x+'px'; ghost.style.top=y+'px';
  if (powerUpMap[color]) showPowerUpHints(color);
}

function startDragFromBoard(state, r, c, x, y) {
  dragColor = state.variant || state.color;
  dragSource = {row:r,col:c}; dragging = true;
  if (PIECE_SVGS[dragColor]) { ghost.className='drag-ghost ghost-svg'; ghost.innerHTML=PIECE_SVGS[dragColor]; }
  else { ghost.className='drag-ghost'; ghost.innerHTML=''; }
  ghost.style.display='block'; ghost.style.left=x+'px'; ghost.style.top=y+'px';
}

function showPowerUpHints(color) {
  const pu = powerUpMap[color];
  if (!pu) return;
  const cells = document.querySelectorAll('#board .cell');
  for (let r = 0; r < boardSize; r++) for (let c = 0; c < boardSize; c++) {
    const idx = r * boardSize + c;
    if (cells[idx] && pu.canActivate({row:r, col:c})) {
      cells[idx].classList.add('powerup-hint');
    }
  }
}

function clearPowerUpHints() {
  document.querySelectorAll('.powerup-hint').forEach(c => c.classList.remove('powerup-hint'));
}

function handleDragMove(x, y) {
  ghost.style.left=x+'px'; ghost.style.top=y+'px';
  document.querySelectorAll('.drop-valid,.drop-invalid').forEach(c=>c.classList.remove('drop-valid','drop-invalid'));
  const target = getCellAt(x, y);
  if (target) {
    const idx=target.row*boardSize+target.col;
    const cells=document.querySelectorAll('#board .cell');
    if (cells[idx]) cells[idx].classList.add(canDrop(target.row,target.col,dragColor)?'drop-valid':'drop-invalid');
  }
}

// Touch events on document
document.addEventListener('touchmove', e => {
  if (!dragging) return;
  e.preventDefault();
  const {x,y} = getEventXY(e);
  handleDragMove(x, y);
}, {passive: false});

document.addEventListener('touchend', e => {

  const {x,y} = getEventXY(e);
  ghost.style.display='none';
  document.querySelectorAll('.drop-valid,.drop-invalid').forEach(c=>c.classList.remove('drop-valid','drop-invalid'));
  document.body.style.overflow = '';
  const target = getCellAt(x, y);

  if (dragSource) {
    const sameCell = target&&target.row===dragSource.row&&target.col===dragSource.col;
    if (target&&!sameCell&&canDrop(target.row,target.col,dragColor)) {
      const colorMap={green2:'green',blue2:'blue',blue3:'blue',blue4:'blue',purple2:'purple',purple3:'purple',purple4:'purple'};
      const variant = PIECE_SVGS[dragColor] ? dragColor : null;
      const boardColor = colorMap[dragColor]||dragColor;
      // Preserve rotation tracking before removePieceWithLinks clears it
      const srcKey=dragSource.row+','+dragSource.col;
      const savedRotation=rotatedPieces[srcKey];
      removePieceWithLinks(dragSource.row, dragSource.col);
      // Restore rotation to new cell (removePieceWithLinks refunded the power-up, re-consume it)
      if (savedRotation) { rotatedPieces[target.row+','+target.col]=savedRotation; powerUpUses.rotate++; updatePowerUpUI(); }
      history.push({row:target.row,col:target.col,prev:boardState[target.row][target.col]});
      boardState[target.row][target.col]={type:'piece',color:boardColor,variant};
      xpDropTarget={row:target.row,col:target.col,variant};
      renderBoard(); updateStatus(); checkStars();
    } else if (!target) {
      xpDropTarget={row:dragSource.row,col:dragSource.col,variant:dragColor};
      removePieceWithLinks(dragSource.row, dragSource.col);
      renderBoard(); updateStatus(); checkStars();
    }
  } else if (powerUpMap[dragColor]) {
    if (target) { const pu=powerUpMap[dragColor]; if (pu.canActivate(target)) PowerUpManager.activate(pu,target); }
  } else {
    // Touch: palette to board — consume from inventory
    if (target && !canDrop(target.row,target.col,dragColor)) SoundManager.error();
    if (target&&canDrop(target.row,target.col,dragColor)&&consumePiece(dragColor)) {
      const colorMap={green2:'green',blue2:'blue',blue3:'blue',blue4:'blue',purple2:'purple',purple3:'purple',purple4:'purple'};
      const variant = PIECE_SVGS[dragColor] ? dragColor : null;
      const boardColor = colorMap[dragColor]||dragColor;
      history.push({row:target.row,col:target.col,prev:boardState[target.row][target.col]});
      boardState[target.row][target.col]={type:'piece',color:boardColor,variant};
      xpDropTarget={row:target.row,col:target.col,variant};
      saveCurrentBoard(); updateInventoryUI();
      renderBoard(); updateStatus(); checkStars();
    }
  }
  clearPowerUpHints(); dragging=false; dragColor=null; dragSource=null;
});

let helpSlideIdx = 0;
let helpSlideCount = 0;

function backToHelpMenu() {
  document.getElementById('help-menu').style.display = '';
  document.getElementById('help-carousel-view').style.display = 'none';
}

function openHelpCategory(catIdx) {
  const cat = HELP_CATEGORIES[catIdx];
  if (!cat) return;
  document.getElementById('help-menu').style.display = 'none';
  document.getElementById('help-carousel-view').style.display = '';
  document.getElementById('help-cat-title').textContent = cat.title;

  // Inject slides
  const slidesEl = document.getElementById('help-slides');
  slidesEl.innerHTML = cat.slides.map(s => '<div class="help-slide">' + s + '</div>').join('');
  helpSlideCount = cat.slides.length;
  helpSlideIdx = 0;

  // Build dots
  const dotsEl = document.getElementById('help-dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < helpSlideCount; i++) {
    const dot = document.createElement('div');
    dot.className = 'help-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goToHelpSlide(i);
    dotsEl.appendChild(dot);
  }
  updateHelpCarousel();

  // Swipe support
  if (!slidesEl._swipeInit) {
    let sx = 0, dx = 0;
    slidesEl.addEventListener('touchstart', e => { sx = e.touches[0].clientX; dx = 0; }, {passive: true});
    slidesEl.addEventListener('touchmove', e => { dx = e.touches[0].clientX - sx; }, {passive: true});
    slidesEl.addEventListener('touchend', () => { if (Math.abs(dx) > 40) { dx < 0 ? helpNext() : helpPrev(); } });
    slidesEl._swipeInit = true;
  }
}

function goToHelpSlide(n) {
  helpSlideIdx = Math.max(0, Math.min(helpSlideCount - 1, n));
  updateHelpCarousel();
}
function helpNext() { goToHelpSlide(helpSlideIdx + 1); }
function helpPrev() { goToHelpSlide(helpSlideIdx - 1); }

function updateHelpCarousel() {
  const slides = document.querySelectorAll('.help-slide');
  slides.forEach(s => { s.style.transform = 'translateX(-' + (helpSlideIdx * 100) + '%)'; });
  document.getElementById('help-counter').textContent = (helpSlideIdx + 1) + ' / ' + helpSlideCount;
  document.getElementById('help-prev').disabled = helpSlideIdx === 0;
  document.getElementById('help-next').disabled = helpSlideIdx === helpSlideCount - 1;
  const dots = document.querySelectorAll('.help-dot');
  dots.forEach((d, i) => d.classList.toggle('active', i === helpSlideIdx));
  // Hide nav for single-slide categories
  document.querySelector('.help-nav').style.display = helpSlideCount <= 1 ? 'none' : '';
}

    { cost: { Common: 2 } }
  ],
  Epic: [

  ],

const RARITY_VARIANTS = {
  Common: ['green', 'green2'],
  Rare: ['blue', 'blue2', 'blue3', 'blue4'],
  Epic: ['purple', 'purple2', 'purple3', 'purple4'],
  Legendary: ['orange'],
  Mythic: ['red']
};

const RARITY_COLORS = {
  Common: 'var(--rarity-common)', Rare: 'var(--rarity-rare)',
  Epic: 'var(--rarity-epic)', Legendary: 'var(--rarity-legendary)', Mythic: 'var(--color-danger)'
};

let exchangeTarget = null;
let exchangeSelectedRecipe = null;

function openExchange() {
  exchangeTarget = 'Rare';
  exchangeSelectedRecipe = null;
  document.getElementById('exchange-modal').classList.add('open');
  renderExchangeTargets();
  renderExchangeRecipes();
}
function closeExchange() {
  document.getElementById('exchange-modal').classList.remove('open');
}

function getInventoryByRarity(rarity) {
  return RARITY_VARIANTS[rarity].reduce((sum, v) => sum + (inventory[v] || 0), 0);
}

function canAffordRecipe(recipe) {
  for (const [rarity, count] of Object.entries(recipe.cost)) {
    if (getInventoryByRarity(rarity) < count) return false;
  }
  return true;
}

function renderExchangeTargets() {
  const el = document.getElementById('exchange-targets');
  el.innerHTML = '';
  for (const rarity of ['Rare', 'Epic', 'Legendary', 'Mythic']) {
    const btn = document.createElement('button');
    btn.className = 'exchange-target-btn' + (rarity === exchangeTarget ? ' active' : '');
    btn.textContent = rarity;
    btn.style.color = rarity === exchangeTarget ? 'var(--color-text-primary)' : RARITY_COLORS[rarity];
    btn.onclick = () => { exchangeTarget = rarity; exchangeSelectedRecipe = null; renderExchangeTargets(); renderExchangeRecipes(); };
    el.appendChild(btn);
  }
}

function renderExchangeRecipes() {
  const el = document.getElementById('exchange-recipes');
  const resultEl = document.getElementById('exchange-result');
  const confirmBtn = document.getElementById('exchange-confirm');
  el.innerHTML = '<div class="exchange-section-label">Select Recipe</div>';
  const recipes = EXCHANGE_RECIPES[exchangeTarget] || [];
  recipes.forEach((recipe, idx) => {
    const row = document.createElement('div');
    const affordable = canAffordRecipe(recipe);
    row.className = 'exchange-recipe' + (!affordable ? ' unaffordable' : '') + (exchangeSelectedRecipe === idx ? ' selected' : '');
    const costHtml = Object.entries(recipe.cost).map(([r, c]) => {
      const v = RARITY_VARIANTS[r][0];
      const have = getInventoryByRarity(r);
      return '<span class="recipe-cost-item"><div class="recipe-svg">' + (PIECE_SVGS[v] || '') + '</div><div><strong>' + c + 'x</strong><div class="recipe-have">' + have + ' owned</div></div></span>';
    }).join('<span style="color:var(--color-text-faint);font-size:14px">+</span>');
    const tv = RARITY_VARIANTS[exchangeTarget][0];
    row.innerHTML = '<div class="recipe-cost" style="display:flex;align-items:center;gap:var(--space-200);flex:1">' + costHtml + '</div>' +
      '<span class="recipe-arrow" style="color:var(--color-text-faint)"><i class="fa-solid fa-arrow-right"></i></span>' +
      '<span class="recipe-cost-item"><div class="recipe-svg">' + (PIECE_SVGS[tv] || '') + '</div><strong>1x</strong></span>';
    row.onclick = () => { exchangeSelectedRecipe = idx; renderExchangeRecipes(); };
    el.appendChild(row);
  });

  // Update result preview
  if (exchangeSelectedRecipe !== null && canAffordRecipe(recipes[exchangeSelectedRecipe])) {
    const variants = RARITY_VARIANTS[exchangeTarget];
    const previewVariant = variants[0];
    resultEl.style.display = 'flex';
    resultEl.innerHTML = '<div class="exchange-result-svg">' + (PIECE_SVGS[previewVariant] || '') + '</div>' +
      '<span class="exchange-result-label">Random <span style="color:' + RARITY_COLORS[exchangeTarget] + '">' + exchangeTarget + '</span> piece</span>';
    confirmBtn.disabled = false;
    confirmBtn.textContent = 'Exchange';
  } else {
    resultEl.style.display = 'none';
    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Select a recipe';
  }
}

function executeExchange() {
  if (exchangeSelectedRecipe === null) return;
  const recipe = EXCHANGE_RECIPES[exchangeTarget][exchangeSelectedRecipe];
  if (!canAffordRecipe(recipe)) return;

  // Consume pieces (take from first available variants of each rarity)
  for (const [rarity, count] of Object.entries(recipe.cost)) {
    let remaining = count;
    for (const v of RARITY_VARIANTS[rarity]) {
      if (remaining <= 0) break;
      const take = Math.min(inventory[v], remaining);
      inventory[v] -= take;
      remaining -= take;
    }
  }

  // Grant random variant of target rarity
  const variants = RARITY_VARIANTS[exchangeTarget];
  const gained = variants[Math.floor(Math.random() * variants.length)];
  inventory[gained] = (inventory[gained] || 0) + 1;

  saveInventory();
  updateInventoryUI();
  exchangeSelectedRecipe = null;
  renderExchangeRecipes();
  renderExchangeTargets();
}

function populatePieces() {

    count.className = 'piece-count'; count.id = 'count-' + v;

    item.appendChild(count);

      if (e.button!==0) return; e.preventDefault();
      startDragFromPalette(v, e.clientX, e.clientY);
    });
    item.addEventListener('touchstart', e => {
      e.preventDefault(); document.body.style.overflow='hidden';
      const {x,y}=getEventXY(e); startDragFromPalette(v, x, y);
    }, {passive:false});

  }

let prevInventoryCounts = {};
function updateInventoryUI() {
  for (const v of ALL_VARIANTS) {
    const countEl = document.getElementById('count-' + v);
    if (countEl) {
      const oldCount = prevInventoryCounts[v];
      const newCount = inventory[v];
      countEl.textContent = 'x' + newCount;
      // Tick animation on count change
      if (oldCount !== undefined && newCount !== oldCount) {
        countEl.classList.remove('count-tick');
        void countEl.offsetWidth;
        countEl.classList.add('count-tick');
      }
      prevInventoryCounts[v] = newCount;
    }
    const item = countEl?.parentElement;
    if (item) {
      if (inventory[v] <= 0) item.classList.add('depleted');
      else item.classList.remove('depleted');
    }
  }
}

function updatePowerUpUI() {
  document.querySelectorAll('.powerup-item').forEach(item => {
    const color = item.dataset.color;
    if (!color || !powerUpUses.hasOwnProperty(color)) return;
    const usesEl = item.querySelector('.powerup-uses');
    if (powerUpUses[color] >= POWERUP_MAX) {
      item.classList.add('used');
      if (usesEl) usesEl.textContent = 'USED';
    } else {
      item.classList.remove('used');
      if (usesEl) usesEl.textContent = 'x' + (POWERUP_MAX - powerUpUses[color]);
    }
  });
}

// Level completion tracking
function getCompletedLevels() {
  try { return JSON.parse(localStorage.getItem('puzzle-completed-levels') || '[]'); } catch(e) { return []; }
}
function markLevelCompleted(file) {
  const completed = getCompletedLevels();
  if (!completed.includes(file)) { completed.push(file); localStorage.setItem('puzzle-completed-levels', JSON.stringify(completed)); }
}
// Level rewards: each level index maps to an array of { variant, count } items
// MEM score tracking per board
function saveBoardMem(file, score) {
  const data = JSON.parse(localStorage.getItem('puzzle-board-mem') || '{}');
  data[file] = Math.max(data[file] || 0, score); // keep best score
  localStorage.setItem('puzzle-board-mem', JSON.stringify(data));
}
function getTotalMem() {
  const data = JSON.parse(localStorage.getItem('puzzle-board-mem') || '{}');
  return Object.values(data).reduce((sum, v) => sum + v, 0);
}

// Tiered rewards: 1★ = lowest piece, 2★ = rest of base, 3★ = bonus (next rarity up)
const LEVEL_REWARDS = {
  0: { 1: [{ variant: 'green', count: 1 }],  2: [{ variant: 'green2', count: 1 }], 3: [{ variant: 'blue', count: 1 }] },   // L1: CC → +R
  1: { 1: [{ variant: 'green', count: 1 }],  2: [{ variant: 'blue2', count: 1 }],  3: [{ variant: 'purple', count: 1 }] },  // L2: CR → +E
  2: { 1: [{ variant: 'blue', count: 1 }],   2: [{ variant: 'blue3', count: 1 }],  3: [{ variant: 'purple2', count: 1 }] }, // L3: RR → +E
  3: { 1: [{ variant: 'blue', count: 1 }],   2: [{ variant: 'purple3', count: 1 }],3: [{ variant: 'orange', count: 1 }] },  // L4: RE → +L
  4: { 1: [{ variant: 'purple', count: 1 }], 2: [{ variant: 'purple4', count: 1 }],3: [{ variant: 'orange', count: 1 }] },  // L5: EE → +L
  5: { 1: [{ variant: 'purple', count: 1 }], 2: [{ variant: 'orange', count: 1 }], 3: [{ variant: 'red', count: 1 }] },     // L6: EL → +M
  6: { 1: [{ variant: 'orange', count: 1 }], 2: [{ variant: 'orange', count: 1 }], 3: [{ variant: 'red', count: 1 }] },     // L7: LL → +M
};

function getRewardsForStars(levelIdx, starCount) {
  const tiers = LEVEL_REWARDS[levelIdx];
  if (!tiers) return [];
  const rewards = [];
  for (let s = 1; s <= Math.min(starCount, 3); s++) {
    if (tiers[s]) rewards.push(...tiers[s]);
  }
  return rewards;
}

function showNextLevelNotification(levelIdx, totalStars, boardMem) {
  SoundManager.complete();
  document.querySelectorAll('.next-level-overlay,.next-level-notify').forEach(el => el.remove());
  const overlay = document.createElement('div');
  overlay.className = 'next-level-overlay';
  const notify = document.createElement('div');
  notify.className = 'next-level-notify';

  // Tiered rewards — grant only NEW star tiers
  const currentStars = getBoardStars(currentBoardFile);
  const prevGranted = grantedRewards[currentBoardFile] || { maxStars: 0, pieces: [] };
  const newRewards = [];
  for (let s = prevGranted.maxStars + 1; s <= Math.min(currentStars, 3); s++) {
    const tierRewards = (LEVEL_REWARDS[levelIdx] || {})[s] || [];
    tierRewards.forEach(r => {
      inventory[r.variant] = (inventory[r.variant] || 0) + r.count;
      newRewards.push({ variant: r.variant, count: r.count, star: s });
      prevGranted.pieces.push({ variant: r.variant, count: r.count });
    });
  }
  prevGranted.maxStars = Math.max(prevGranted.maxStars, Math.min(currentStars, 3));
  grantedRewards[currentBoardFile] = prevGranted;
  if (newRewards.length > 0) { saveGrantedRewards(); saveInventory(); updateInventoryUI(); }

  // Stars visual (filled/empty)
  const starSvgFull = '<svg viewBox="0 0 236 236" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 198.691V16.7137C6 10.7967 10.7969 6 16.7143 6H39.4489C42.0594 6 44.5802 6.95305 46.5377 8.68016L124.918 77.8359C129.94 82.2662 137.749 81.0563 141.195 75.3145L179.665 11.2015C181.601 7.97452 185.089 6 188.852 6H220.286C226.203 6 231 10.7967 231 16.7137V80.9958C231 86.9129 226.203 91.7095 220.286 91.7095H198.857C192.94 91.7095 188.143 96.5062 188.143 102.423V177.419C188.143 183.336 192.94 188.133 198.857 188.133H220.286C226.203 188.133 231 192.929 231 198.846V220.286C231 226.203 226.203 231 220.286 231H113.13C107.212 231 102.415 226.203 102.415 220.286V192.323C102.415 186.313 105.246 180.654 110.055 177.049C128.648 163.108 130.354 135.704 113.921 119.272C98.8085 104.16 73.9107 104.155 58.7978 119.267C42.3609 135.703 44.0764 163.109 62.6783 177.048C67.4899 180.654 70.322 186.315 70.322 192.327V220.286C70.322 226.203 65.5251 231 59.6077 231H46.9349C44.7009 231 42.5229 230.302 40.7054 229.003L10.4848 207.408C7.67026 205.397 6 202.151 6 198.691Z" fill="#FAE932"/><path d="M107 146.5C107 158.374 97.3741 168 85.5 168C73.6259 168 64 158.374 64 146.5C64 134.626 73.6259 125 85.5 125C97.3741 125 107 134.626 107 146.5Z" fill="#E51A4B"/></svg>';
  const starSvgEmpty = '<svg viewBox="0 0 236 236" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 198.691V16.7137C6 10.7967 10.7969 6 16.7143 6H39.4489C42.0594 6 44.5802 6.95305 46.5377 8.68016L124.918 77.8359C129.94 82.2662 137.749 81.0563 141.195 75.3145L179.665 11.2015C181.601 7.97452 185.089 6 188.852 6H220.286C226.203 6 231 10.7967 231 16.7137V80.9958C231 86.9129 226.203 91.7095 220.286 91.7095H198.857C192.94 91.7095 188.143 96.5062 188.143 102.423V177.419C188.143 183.336 192.94 188.133 198.857 188.133H220.286C226.203 188.133 231 192.929 231 198.846V220.286C231 226.203 226.203 231 220.286 231H113.13C107.212 231 102.415 226.203 102.415 220.286V192.323C102.415 186.313 105.246 180.654 110.055 177.049C128.648 163.108 130.354 135.704 113.921 119.272C98.8085 104.16 73.9107 104.155 58.7978 119.267C42.3609 135.703 44.0764 163.109 62.6783 177.048C67.4899 180.654 70.322 186.315 70.322 192.327V220.286C70.322 226.203 65.5251 231 59.6077 231H46.9349C44.7009 231 42.5229 230.302 40.7054 229.003L10.4848 207.408C7.67026 205.397 6 202.151 6 198.691Z" fill="#424263"/><path d="M107 146.5C107 158.374 97.3741 168 85.5 168C73.6259 168 64 158.374 64 146.5C64 134.626 73.6259 125 85.5 125C97.3741 125 107 134.626 107 146.5Z" fill="#242445"/></svg>';
  let starsHtml = '<div class="notify-stars-earned">';
  for (let s = 1; s <= 3; s++) {
    starsHtml += '<div class="notify-star-icon' + (s > currentStars ? ' dim' : '') + '">' + (s <= currentStars ? starSvgFull : starSvgEmpty) + '</div>';
  }
  starsHtml += '</div>';

  // All 3 reward tiers — earned highlighted, unearned greyed
  const tiers = LEVEL_REWARDS[levelIdx] || {};
  const rarityColors = { Common:'var(--rarity-common)', Rare:'var(--rarity-rare)', Epic:'var(--rarity-epic)', Legendary:'var(--rarity-legendary)', Mythic:'var(--color-danger)' };
  let tiersHtml = '<div class="notify-divider"></div><div class="notify-reward-title">Level Rewards</div><div class="notify-rewards">';
  for (let s = 1; s <= 3; s++) {
    const tierItems = tiers[s] || [];
    const isEarned = s <= currentStars;
    const isNew = newRewards.some(r => r.star === s);
    tierItems.forEach(r => {
      const name = PIECE_NAMES[r.variant] || r.variant;
      const rarity = PIECE_RARITY[r.variant] || 'Common';
      const tierClass = isEarned ? 'earned' : 'locked';
      const badge = isNew ? 'NEW!' : (isEarned ? 'Earned' : 'Locked');
      const tierMemSvg = isEarned ? starSvgFull : starSvgEmpty;
      tiersHtml += '<div class="notify-tier ' + tierClass + '">' +
        '<span class="notify-tier-star">' + tierMemSvg + '</span>' +
        '<div class="notify-tier-piece">' + (PIECE_SVGS[r.variant] || '') + '</div>' +
        '<div class="notify-tier-info"><span class="notify-tier-name">' + r.count + 'x ' + name + '</span><span class="notify-tier-rarity" style="color:' + (rarityColors[rarity] || 'var(--color-text-faint)') + '">' + rarity + '</span></div>' +
        '<span class="notify-tier-badge">' + badge + '</span>' +
        '</div>';
    });
  }
  tiersHtml += '</div>';

  // MEM score section
  const totalMem = getTotalMem();
  const memHtml = '<div class="notify-mem"><span class="notify-mem-board">' + (boardMem || 0) + ' MEM earned</span><span class="notify-mem-total">Total: ' + totalMem + ' MEM</span></div>';

  // Find newly unlocked levels
  let unlockedMsg = '';
  for (let i = 1; i < BOARDS.length; i++) {
    if (totalStars >= LEVEL_STAR_THRESHOLDS[i] && totalStars - getBoardStars(currentBoardFile) < LEVEL_STAR_THRESHOLDS[i]) {
      unlockedMsg = 'Level ' + (i + 1) + ' is now unlocked!';
    }
  }
  if (!unlockedMsg) unlockedMsg = totalStars + ' total stars earned';

  notify.innerHTML = '<div class="notify-title">Stars Earned!</div>' +
    starsHtml +
    '<div class="notify-msg">' + unlockedMsg + '</div>' +
    memHtml +
    tiersHtml +
    '<div class="notify-buttons">' +
    '<button class="notify-btn notify-btn-primary" data-action="continue">Continue</button>' +
    '<button class="notify-btn notify-btn-neutral" data-action="reset">Retry</button>' +
    '<button class="notify-btn notify-btn-neutral" data-action="levels">Level Select</button>' +
    '</div>';

  document.body.appendChild(overlay);
  document.body.appendChild(notify);
  requestAnimationFrame(() => { overlay.classList.add('show'); notify.classList.add('show'); });

  const dismiss = () => { overlay.classList.remove('show'); notify.classList.remove('show'); setTimeout(() => { overlay.remove(); notify.remove(); }, 200); };

  notify.querySelector('[data-action="continue"]').addEventListener('click', dismiss);
  notify.querySelector('[data-action="reset"]').addEventListener('click', () => { dismiss(); confirmResetBoard(); });
  notify.querySelector('[data-action="levels"]').addEventListener('click', () => { dismiss(); toggleLevels(); });
}

function isLevelUnlocked(idx) {
  if (idx >= LEVEL_STAR_THRESHOLDS.length) return false;
  return getTotalStars() >= LEVEL_STAR_THRESHOLDS[idx];
}

async function initBoardSelector() {
  const container = document.getElementById('board-selector');
  const completed = getCompletedLevels();
  for (let i = 0; i < BOARDS.length; i++) {
    const b = BOARDS[i];
    try {
      const resp = await fetch(b.file);
      const data = await resp.json();
      const unlocked = isLevelUnlocked(i);
      const done = completed.includes(b.file);

      // Row with node + card (no connector divs — SVG lines drawn after)
      const row = document.createElement('div');
      row.className = 'level-row ' + (i % 2 === 0 ? 'align-left' : 'align-right');

      const node = document.createElement('div');
      node.className = 'level-node ' + (done ? 'completed' : (unlocked ? 'unlocked' : 'locked'));
      if (done) node.innerHTML = '<i class="fa-solid fa-check" style="color:var(--color-text-primary)"></i>';
      else if (!unlocked) node.innerHTML = '<i class="fa-solid fa-lock" style="color:var(--color-text-faint);font-size:8px"></i>';

      const card = document.createElement('div');
      card.className = 'board-card' + (!unlocked ? ' locked' : '');
      const threshold = LEVEL_STAR_THRESHOLDS[i] || 0;
      const lockInfo = !unlocked ? '<div class="board-card-info" style="color:var(--color-brand-yellow)">' + threshold + '★ needed</div>' : '';
      const bStars = getBoardStars(b.file);
      const bMemData = JSON.parse(localStorage.getItem('puzzle-board-mem') || '{}');
      const bMem = bMemData[b.file] || 0;
      const bPieces = boardPlacements[b.file] ? Object.keys(boardPlacements[b.file]).length : 0;
      const hasStats = bStars > 0 || bMem > 0 || bPieces > 0;
      const statsHtml = hasStats ? '<div class="board-card-stats"><span class="board-card-stars">' + bStars + '/3★</span><span class="board-card-mem">' + bMem + ' MEM</span><span>' + bPieces + ' pcs</span></div>' : '';
      card.innerHTML = '<div class="board-card-name">' + data.metadata.name + '</div><div class="board-card-info">' + data.metadata.boardSize + 'x' + data.metadata.boardSize + ' | ' + data.metadata.difficulty + '</div>' + statsHtml + lockInfo;
      if (unlocked) {
        card.addEventListener('click', () => {
          document.querySelectorAll('.board-card').forEach(c=>c.classList.remove('active'));
          card.classList.add('active');
          loadBoardFile(b.file);
          closeLevels();
        });
      }

      row.appendChild(node);
      row.appendChild(card);
      container.appendChild(row);
    } catch(e) { console.error('Failed to load board:', b.file, e); }
  }
  // Lines drawn when modal opens (needs layout to be visible)
}

function drawPathLines(completed) {
  const container = document.getElementById('board-selector');
  const nodes = container.querySelectorAll('.level-node');
  if (nodes.length < 2) return;
  // Remove old SVG
  container.querySelector('.path-line')?.remove();
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('path-line');
  const rect = container.getBoundingClientRect();
  svg.setAttribute('width', rect.width);
  svg.setAttribute('height', rect.height);
  for (let i = 0; i < nodes.length - 1; i++) {
    const a = nodes[i].getBoundingClientRect();
    const b = nodes[i+1].getBoundingClientRect();
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', a.left - rect.left + a.width/2);
    line.setAttribute('y1', a.top - rect.top + a.height/2);
    line.setAttribute('x2', b.left - rect.left + b.width/2);
    line.setAttribute('y2', b.top - rect.top + b.height/2);
    if (completed && completed.includes(BOARDS[i].file)) line.classList.add('completed');
    svg.appendChild(line);
  }
  container.insertBefore(svg, container.firstChild);
}

// Re-render on resize for responsive cell sizing
window.addEventListener('resize', () => { if (boardSize > 0) renderBoard(); });

// === INIT ===
populatePieces();
initBoardSelector().then(() => {
  // Auto-load Level 1
  const firstCard = document.querySelector('.board-card');
  if (firstCard) { firstCard.classList.add('active'); loadBoardFile(BOARDS[0].file); }
});
</script>
