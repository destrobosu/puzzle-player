<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fragmented</title>
<link rel="stylesheet" href="https://kit.fontawesome.com/f7fb6cccf3.css" crossorigin="anonymous">
<style>
  /* === FB Design System — Official Claude Rules === */
  :root {
    /* Backgrounds (dark-first) */
    --color-bg-page: #00002F;
    --color-bg-surface: #1A1A44;
    --color-bg-elevated: #252550;
    --color-bg-sunken: #000022;
    /* Borders */
    --color-border-default: #333359;
    --color-border-subtle: #2A2A4E;
    --color-border-secondary: #808097;
    /* Text */
    --color-text-primary: #f3f3f3;
    --color-text-secondary: #9999ac;
    --color-text-faint: #666682;
    /* Brand */
    --color-accent: #2383E2;
    --color-positive: #14AE5C;
    --color-positive-secondary: #02542d;
    --color-warning: #E8B931;
    --color-danger: #EC221F;
    /* Brand colors */
    --color-brand-magenta: #E51A4B;
    --color-brand-yellow: #F0E800;
    --color-brand-orange: #FF8400;
    --color-brand-navy: #00002F;
    --color-brand-indigo: #120466;
    /* FB Mode (tooltips, badges, branded overlays) */
    --fb-bg: #00002F;
    --fb-surface: #1A1A44;
    --fb-border: #333359;
    --fb-text: #f3f3f3;
    --fb-secondary: #9999ac;
    --fb-faint: #666682;
    /* Rarity primitives */
    --rarity-common: #9E9E9E;
    --rarity-uncommon: #4CAF50;
    --rarity-rare: #2196F3;
    --rarity-epic: #9C27B0;
    --rarity-legendary: #FF9800;
    /* Spacing (8pt grid) */
    --space-100: 4px;
    --space-200: 8px;
    --space-300: 12px;
    --space-400: 16px;
    --space-600: 24px;
    --space-800: 32px;
    /* Radius */
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 16px;
    --radius-xl: 32px;
    --radius-full: 9999px;
    /* Typography */
    --font-display: 'AKIRA Expanded', Impact, sans-serif;
    --font-body: 'Cera Pro', system-ui, sans-serif;
    --font-mono: 'Cera Mono', 'SF Mono', monospace;
    /* Shadows */
    --shadow-light: 0 1px 4px rgba(12,12,13,0.1), 0 1px 4px rgba(12,12,13,0.05);
    --shadow-heavy: 0 4px 4px -4px rgba(12,12,13,0.05), 0 16px 16px -8px rgba(12,12,13,0.1);
    /* Motion (MD3) */
    --ease-enter: cubic-bezier(0.2, 0, 0, 1);
    --ease-exit: cubic-bezier(0.4, 0, 1, 1);
    --duration-fast: 150ms;
    --duration-normal: 200ms;
    --duration-slow: 300ms;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--color-bg-page); color: var(--color-text-primary); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: var(--space-600); user-select: none; }
  h1 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; margin-bottom: var(--space-300); text-transform: uppercase; letter-spacing: 1px; color: var(--color-brand-magenta); }

  .controls { display: flex; gap: var(--space-200); margin-bottom: var(--space-400); flex-wrap: wrap; justify-content: center; align-items: center; }
  .controls button { padding: var(--space-200) var(--space-400); border: 1px solid var(--color-border-default); background: var(--color-bg-surface); color: var(--color-text-primary); border-radius: var(--radius-lg); corner-shape: squircle; cursor: pointer; font-family: var(--font-body); font-size: 13px; transition: all var(--duration-fast) var(--ease-enter); height: 40px; }
  .controls button:hover { background: var(--color-bg-elevated); }
  .controls button.active { background: #E51A4B; border-color: #E51A4B; color: var(--color-text-primary); }


  .game-layout { display: flex; flex-direction: column; align-items: center; gap: var(--space-400); }

  /* Board */
  .board-area { display: flex; flex-direction: column; align-items: center; }
  .board-area h2 { margin-bottom: var(--space-200); font-size: 1rem; color: var(--color-text-secondary); }
  .board-wrapper { position: relative; display: inline-block; padding: var(--space-800); }
  /* Arrow labels outside the board — ES connector SVGs */
  .board-label { position: absolute; pointer-events: none; display: flex; align-items: center; justify-content: center; }
  .board-label .label-arrow { flex-shrink: 0; }
  .board-label.label-side-T .label-arrow, .board-label.label-side-B .label-arrow { width: 20px; height: 34px; }
  .board-label.label-side-L .label-arrow, .board-label.label-side-R .label-arrow { width: 34px; height: 20px; }
  .build-info { position: fixed; bottom: var(--space-200); right: var(--space-300); font-family: var(--font-mono); font-size: 0.625rem; color: var(--color-text-faint); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Touch support */
  .palette-item, .powerup-item, .board .cell { touch-action: none; }

  /* Mobile responsive */
  @media (max-width: 600px) {
    body { padding: var(--space-100) var(--space-100) var(--space-200); overflow-y: auto; overflow-x: hidden; min-height: 100vh; min-height: 100dvh; height: auto; display: flex; flex-direction: column; }
    h1 { font-size: 1rem; margin-bottom: 2px; }
    .top-bar { max-width: 100%; gap: var(--space-100); margin-bottom: var(--space-100); }
    .top-bar-header { padding: var(--space-100) var(--space-200); }
    .top-bar-title { font-size: 0.7rem; }
    .top-bar-content { padding: 0 var(--space-200) var(--space-200); }
    .board-selector { gap: 2px; }
    .board-card { padding: var(--space-100) var(--space-200); max-width: 160px; }
    .board-card-name { font-size: 11px; }
    .board-card-info { font-size: 8px; }
    .board-card-stats { font-size: 8px; }
    .info-panel { padding: var(--space-100) var(--space-200); max-width: 100%; gap: var(--space-100); }
    .stat-level, .stat-mem { font-size: 0.75rem; }
    .star { width: 14px; height: 14px; }
    .reset-btn { font-size: 0.6rem; padding: var(--space-100) var(--space-200); height: 24px; }
    .game-layout { gap: var(--space-100); flex: 1; min-height: 0; }
    .inventory-panel { padding: var(--space-100) var(--space-200); gap: var(--space-100); max-width: 100%; flex-shrink: 0; }
    .inventory-label { font-size: 0.5rem; }
    .pieces-inventory { gap: 0; grid-template-columns: repeat(4, 1fr); }
    .palette-swatch { width: 20px; height: 20px; }
    .palette-item { padding: 1px 1px 0 1px; }
    .piece-count { font-size: 0.375rem; margin-top: 0; line-height: 1; padding-bottom: 0; }
    .powerups-row { gap: 2px; }
    .powerup-item { padding: 1px var(--space-100); }
    .powerup-name { font-size: 0.55rem; }
    .powerup-swatch { width: 20px; height: 20px; }
    .powerup-uses { font-size: 0.375rem; }
    .win-banner { font-size: 0.85rem; margin-top: 2px; }
    .build-info { font-size: 0.5rem; bottom: 2px; right: var(--space-100); }
  }
  .board { display: grid; gap: 2px; background: var(--color-bg-sunken); padding: 2px; border-radius: var(--radius-lg); corner-shape: squircle; border: 1px solid var(--color-border-default); }
  .board .cell { width: 56px; height: 56px; background: var(--color-bg-surface); border-radius: var(--radius-sm); corner-shape: squircle; cursor: pointer; transition: border-color var(--duration-fast) var(--ease-enter), box-shadow var(--duration-fast) var(--ease-enter); display: flex; align-items: center; justify-content: center; position: relative; border: 2px solid transparent; }
  .board .cell:hover { border-color: rgba(255,255,255,0.3); }
  .board .cell.filled { border-color: rgba(255,255,255,0.1); cursor: grab; }
  .board .cell.filled:active { cursor: grabbing; }
  .board .cell.cell-svg { background: transparent; border-color: transparent; padding: 0; }
  .board .cell.cell-svg svg { width: 100%; height: 100%; }
  .board .cell.obstacle { background: var(--color-bg-sunken); border-color: var(--color-text-faint); cursor: default; }
  .board .cell.obstacle::after { content: '\f00d'; font-family: 'Font Awesome 6 Pro'; font-weight: 300; color: var(--color-text-faint); font-size: 1rem; }
  /* Connection dots at jigsaw tab midpoints */
  .board .cell.drop-valid { border-color: var(--color-positive); box-shadow: 0 0 8px rgba(20,174,92,0.4); }
  .board .cell.drop-invalid { border-color: var(--color-danger); box-shadow: 0 0 8px rgba(236,34,31,0.4); }

  /* Piece palette */
  .palette-section { background: var(--color-bg-surface); padding: var(--space-400); border-radius: var(--radius-lg); corner-shape: squircle; border: 1px solid var(--color-border-default); min-width: 160px; }
  .palette-section h3 { font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: var(--space-300); text-align: center; }
  .palette-group-label { font-size: 0.875rem; color: var(--color-text-primary); margin-bottom: var(--space-100); }
  .palette-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-200); margin-bottom: var(--space-200); }
  .palette-item { display: flex; align-items: center; justify-content: center; gap: var(--space-200); padding: var(--space-100); border-radius: var(--radius-md); corner-shape: squircle; cursor: grab; border: 2px solid transparent; transition: border-color var(--duration-normal) var(--ease-enter); }
  .palette-item:active { cursor: grabbing; }
  .palette-item:hover { border-color: var(--color-border-default); }
  .palette-swatch { width: 32px; height: 32px; border-radius: var(--radius-sm); corner-shape: squircle; border: 2px solid rgba(255,255,255,0.1); flex-shrink: 0; }
  .swatch-svg { background: transparent; border: none; display: flex; align-items: center; justify-content: center; }
  .palette-label { font-size: 0.8rem; color: var(--color-text-secondary); }
  .swatch-white { background: var(--rarity-common); }

  /* Inventory panel — left/right split */
  .inventory-panel { background: var(--color-bg-surface); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); corner-shape: squircle; padding: var(--space-300) var(--space-400); width: 100%; max-width: 500px; display: flex; gap: var(--space-400); justify-content: center; align-items: flex-start; box-shadow: var(--shadow-light); }
  .inventory-section { display: flex; flex-direction: column; gap: var(--space-200); }
  .inventory-section-left { flex: 1; }
  .inventory-section-right { flex-shrink: 0; }
  .inventory-label { font-family: var(--font-mono); font-size: 0.625rem; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; white-space: nowrap; margin-bottom: var(--space-100); display: flex; align-items: center; gap: var(--space-200); height: 22px; }

  /* Pieces inventory — 4 column grid */
  .pieces-inventory { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }

  /* Power-ups — single column */
  .powerups-row { display: flex; flex-direction: column; gap: var(--space-300); }
  .powerup-swatch { width: 28px; height: 28px; }
  .powerup-name { font-family: var(--font-body); font-size: 0.75rem; color: var(--color-text-primary); font-weight: 700; cursor: pointer; touch-action: auto; position: relative; z-index: 2; }

  /* Tooltip — FB Mode (dark navy) */
  .powerup-tooltip { position: fixed; background: var(--fb-bg); border: 1px solid var(--fb-border); border-radius: var(--radius-lg); padding: var(--space-200) var(--space-300); color: var(--fb-secondary); font-family: var(--font-body); font-size: 12px; max-width: 200px; z-index: 1001; line-height: 1.4; box-shadow: var(--shadow-heavy); pointer-events: auto; corner-shape: squircle; }

  /* Power-up target hint: pulse glow on valid pieces during drag */
  @keyframes pulseHint {
    0%, 100% { box-shadow: 0 0 6px rgba(255,255,255,0.2); }
    50% { box-shadow: 0 0 16px rgba(255,255,255,0.7), 0 0 24px rgba(255,255,255,0.3); }
  }
  .board .cell.powerup-hint {
    animation: pulseHint 1.2s var(--ease-enter) infinite;
    border-color: rgba(255,255,255,0.3);
  }

  /* XP drop float animation */
  @keyframes xpFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    20% { opacity: 1; transform: translateY(-8px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-40px) scale(0.8); }
  }
  .xp-drop { position: fixed; pointer-events: none; z-index: 1000; font-family: var(--font-body); font-weight: 800; font-size: 14px; text-shadow: 0 1px 4px rgba(0,0,0,0.5); animation: xpFloat 800ms var(--ease-exit) forwards; }

  /* MEM counter punch animation */
  @keyframes memPunch {
    0% { transform: scale(1); }
    30% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .mem-punch { animation: memPunch 400ms var(--ease-enter); display: inline-block; }

  /* Star earn celebration */
  @keyframes starBounce {
    0% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(240,232,0,0.5)); }
    25% { transform: scale(1.6); filter: drop-shadow(0 0 16px rgba(240,232,0,0.9)) drop-shadow(0 0 32px rgba(240,232,0,0.4)); }
    50% { transform: scale(0.9); }
    75% { transform: scale(1.1); }
    100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(240,232,0,0.5)); }
  }
  .star.star-celebrate { animation: starBounce 500ms var(--ease-enter); }

  /* Piece snap into place */
  @keyframes pieceSnap {
    0% { transform: scale(0.8); opacity: 0.7; }
    40% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .board .cell.cell-snap { animation: pieceSnap 200ms var(--ease-enter); }

  /* Connection spark pulse */
  @keyframes connSpark {
    0% { opacity: 1; transform: scale(0.5); }
    50% { opacity: 0.8; transform: scale(1.2); }
    100% { opacity: 0; transform: scale(1.5); }
  }
  .conn-spark { position: absolute; pointer-events: none; z-index: 3; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%); animation: connSpark 300ms var(--ease-exit) forwards; }

  /* Entry/exit pulse on path connect */
  @keyframes entryExitPulse {
    0% { filter: none; transform: scale(1); }
    50% { filter: drop-shadow(0 0 8px var(--color-positive)); transform: scale(1.2); }
    100% { filter: none; transform: scale(1); }
  }
  .board-label.path-connected { animation: entryExitPulse 600ms var(--ease-enter); }

  /* Inventory count tick */
  @keyframes countTick {
    0% { transform: scale(1); }
    30% { transform: scale(1.4); color: var(--color-brand-magenta); }
    100% { transform: scale(1); }
  }
  .piece-count.count-tick { animation: countTick 300ms var(--ease-enter); display: inline-block; }

  /* Rotate power-up selector */
  .rotate-selector { position: absolute; z-index: 800; background: var(--color-bg-elevated); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); corner-shape: squircle; padding: var(--space-200); display: flex; gap: var(--space-100); box-shadow: var(--shadow-heavy); }
  .rotate-option { width: 48px; height: 48px; cursor: pointer; border: 2px solid transparent; border-radius: var(--radius-md); corner-shape: squircle; background: transparent; padding: 2px; transition: border-color var(--duration-fast) var(--ease-enter); }
  .rotate-option:hover { border-color: var(--color-brand-magenta); }
  .rotate-option svg { width: 100%; height: 100%; }

  /* Red glow on rotated pieces */
  .board .cell.cell-rotated svg { filter: drop-shadow(0 0 4px #E51A4B) drop-shadow(0 0 8px rgba(229,26,75,0.5)); }

  /* Connection light overlay */
  .conn-light { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 2; overflow: visible; }
  .conn-light svg { width: 100%; height: 100%; overflow: visible; }

  /* Next level notification */
  .next-level-notify { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); z-index: 1000; background: var(--color-bg-elevated); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); corner-shape: squircle; padding: var(--space-600) var(--space-800); text-align: center; box-shadow: var(--shadow-heavy); opacity: 0; transition: opacity var(--duration-normal) var(--ease-enter), transform var(--duration-normal) var(--ease-enter); pointer-events: none; }
  .next-level-notify.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
  .next-level-notify .notify-title { font-family: var(--font-display); font-size: 1rem; color: var(--color-positive); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: var(--space-200); }
  .next-level-notify .notify-msg { font-family: var(--font-body); font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: var(--space-400); }
  .notify-buttons { display: flex; gap: var(--space-200); flex-wrap: wrap; justify-content: center; }
  .next-level-notify .notify-btn { font-family: var(--font-body); font-size: 0.8125rem; font-weight: 700; border: none; border-radius: var(--radius-lg); corner-shape: squircle; padding: var(--space-200) var(--space-400); cursor: pointer; transition: opacity var(--duration-fast) var(--ease-enter); }
  .next-level-notify .notify-btn:hover { opacity: 0.85; }
  .notify-btn-primary { background: var(--color-positive); color: var(--color-text-primary); }
  .notify-btn-neutral { background: transparent; border: 1px solid var(--color-border-default) !important; color: var(--color-text-primary); }
  .notify-mem { display: flex; justify-content: center; gap: var(--space-400); margin-bottom: var(--space-200); }
  .notify-mem-board { font-family: var(--font-mono); font-size: 0.875rem; font-weight: 700; color: var(--color-brand-magenta); }
  .notify-mem-total { font-family: var(--font-mono); font-size: 0.875rem; font-weight: 700; color: var(--color-brand-yellow); }
  .notify-divider { width: 100%; height: 1px; background: var(--color-border-default); margin: var(--space-300) 0; }
  .notify-reward-title { font-family: var(--font-mono); font-size: 0.625rem; font-weight: 700; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: var(--space-200); }
  .notify-rewards { display: flex; flex-direction: column; gap: var(--space-200); margin-bottom: var(--space-400); width: 100%; }
  .notify-tier { display: flex; align-items: center; gap: var(--space-300); padding: var(--space-200) var(--space-300); background: var(--color-bg-elevated); border-radius: var(--radius-lg); corner-shape: squircle; border: 1px solid var(--color-border-default); }
  .notify-tier.earned { border-color: var(--color-positive); background: var(--color-positive-secondary); }
  .notify-tier.locked { opacity: 0.35; }
  .notify-tier-star { flex-shrink: 0; width: 20px; height: 20px; }
  .notify-tier-star svg { width: 100%; height: 100%; }
  .notify-tier-piece { width: 32px; height: 32px; flex-shrink: 0; }
  .notify-tier-piece svg { width: 100%; height: 100%; }
  .notify-tier-info { display: flex; flex-direction: column; gap: 2px; }
  .notify-tier-name { font-family: var(--font-body); font-size: 12px; font-weight: 700; color: var(--color-text-primary); }
  .notify-tier-rarity { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }
  .notify-tier-badge { font-family: var(--font-mono); font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-positive); margin-left: auto; flex-shrink: 0; }
  .notify-tier.locked .notify-tier-badge { color: var(--color-text-faint); }
  .notify-stars-earned { display: flex; gap: var(--space-100); justify-content: center; margin-bottom: var(--space-300); }
  .notify-star-icon { width: 24px; height: 24px; }
  .notify-star-icon svg { width: 100%; height: 100%; }
  .notify-star-icon.dim { opacity: 0.2; }
  .next-level-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; opacity: 0; transition: opacity var(--duration-normal) var(--ease-enter); pointer-events: none; }
  .next-level-overlay.show { opacity: 1; pointer-events: auto; }

  /* Drag ghost */
  .drag-ghost { position: fixed; pointer-events: none; z-index: 1000; width: 48px; height: 48px; border-radius: var(--radius-md); corner-shape: squircle; border: 2px solid rgba(255,255,255,0.3); opacity: 0.9; display: none; box-shadow: var(--shadow-heavy); transform: translate(-50%, -50%); }
  .drag-ghost.ghost-svg { background: transparent; border: none; box-shadow: none; }

  /* Info panel — single row: Connected | Slots | MEM | Stars */
  .info-panel { background: var(--color-bg-surface); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); corner-shape: squircle; padding: var(--space-200) var(--space-300); width: 100%; max-width: 500px; display: flex; align-items: center; justify-content: center; gap: var(--space-300); }

  /* Reset button below board */
  .reset-area { display: flex; justify-content: center; width: 100%; gap: var(--space-200); }

  .reset-btn { padding: var(--space-100) var(--space-300); border: 1px solid var(--color-border-default); background: var(--color-bg-elevated); color: var(--color-text-secondary); border-radius: var(--radius-lg); corner-shape: squircle; cursor: pointer; font-family: var(--font-body); font-size: 13px; transition: all var(--duration-fast) var(--ease-enter); height: 32px; display: flex; align-items: center; gap: var(--space-100); }
  .reset-btn:hover { color: var(--color-text-primary); border-color: var(--color-brand-magenta); }
  .reset-btn i { font-size: 12px; }
  .stat-level { font-family: var(--font-body); font-size: 0.875rem; font-weight: 700; color: var(--color-text-primary); white-space: nowrap; }
  .stat-mem { font-family: var(--font-mono); font-size: 0.875rem; font-weight: 700; color: var(--color-brand-magenta); letter-spacing: 0.04em; white-space: nowrap; }

  /* Stars (MEM Fragment icons) */
  .stars { display: flex; gap: var(--space-100); align-items: center; }
  .star { width: 20px; height: 20px; transition: filter var(--duration-slow) var(--ease-enter); }
  .star svg { width: 100%; height: 100%; }
  .star .mem-full { display: none; }
  .star .mem-empty { display: block; }
  .star.earned .mem-full { display: block; }
  .star.earned .mem-empty { display: none; }
  .star.earned { filter: drop-shadow(0 0 4px rgba(240,232,0,0.5)); }

  /* Levels modal overlay */
  .levels-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 900; align-items: center; justify-content: center; }
  .levels-modal.open { display: flex; }
  .levels-modal-box { background: var(--color-bg-surface); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); corner-shape: squircle; padding: var(--space-600); width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; }

  .help-back:hover { border-color: var(--color-brand-magenta); color: var(--color-text-primary); }
  .help-cat-title { font-family: var(--font-body); font-size: 13px; font-weight: 700; color: var(--color-text-primary); flex: 1; text-align: center; }

  /* Growth path level selector */
  .board-selector { position: relative; display: flex; flex-direction: column; gap: 0; width: 100%; }
  /* SVG path line behind everything */
  .path-line { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

  .level-row { display: flex; align-items: center; gap: var(--space-200); position: relative; z-index: 1; padding: var(--space-100) 0; }

  .board-card { display: flex; flex-direction: column; gap: var(--space-100); padding: var(--space-200) var(--space-300); background: var(--color-bg-elevated); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); corner-shape: squircle; cursor: pointer; transition: all var(--duration-fast) var(--ease-enter); max-width: 200px; }
  .board-card:hover { border-color: var(--color-brand-magenta); }

  .board-card.locked:hover { border-color: var(--color-border-default); }
  .board-card-name { font-family: var(--font-body); font-size: 13px; color: var(--color-text-primary); font-weight: 700; }
  .board-card-info { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-secondary); letter-spacing: 0.04em; }
  .board-card-stats { display: flex; gap: var(--space-200); font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--color-text-faint); letter-spacing: 0.04em; }
  .board-card-stars { color: var(--color-brand-yellow); }
  .board-card-mem { color: var(--color-brand-magenta); }

  /* Power-ups */
  .powerup-item { display: flex; align-items: center; gap: var(--space-100); padding: var(--space-100) var(--space-200); border-radius: var(--radius-md); corner-shape: squircle; cursor: grab; border: 2px solid transparent; transition: border-color var(--duration-normal) var(--ease-enter); }
  .powerup-item:hover { border-color: var(--color-border-default); }

  /* Power-up preview states */
  .board .cell.powerup-target { box-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.9); z-index: 2; }
  .board .cell.fill-preview { background: rgba(200,200,200,0.1) !important; border: 2px dashed rgba(200,200,200,0.4); cursor: pointer; }
  .board .cell.fill-preview-last { border-color: var(--rarity-epic); }
  .board .cell.extend-preview { background: rgba(200,200,200,0.1) !important; border: 2px dashed var(--rarity-rare); cursor: pointer; }
  .board .cell.teleport-preview { background: rgba(200,150,255,0.1) !important; border: 2px dashed var(--rarity-epic); cursor: pointer; }
  .fill-arrow { position: absolute; width: 24px; height: 24px; background: rgba(255,255,255,0.7); border-radius: var(--radius-full); corner-shape: squircle; cursor: pointer; z-index: 5; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--color-bg-page); font-weight: bold; transition: background var(--duration-fast) var(--ease-enter), transform var(--duration-fast) var(--ease-enter); touch-action: none; }
  .fill-arrow::before { content: ''; position: absolute; width: 44px; height: 44px; border-radius: var(--radius-full); }
  .fill-arrow:hover { background: var(--color-text-primary); transform: scale(1.3); box-shadow: 0 0 12px rgba(255,255,255,0.8); }
  .fill-arrow.dir-T { top: -14px; left: 50%; transform: translateX(-50%); }
  .fill-arrow.dir-B { bottom: -14px; left: 50%; transform: translateX(-50%); }
  .fill-arrow.dir-L { left: -14px; top: 50%; transform: translateY(-50%); }
  .fill-arrow.dir-R { right: -14px; top: 50%; transform: translateY(-50%); }
  .fill-arrow.dir-T:hover { transform: translateX(-50%) scale(1.3); }
  .fill-arrow.dir-B:hover { transform: translateX(-50%) scale(1.3); }
  .fill-arrow.dir-L:hover { transform: translateY(-50%) scale(1.3); }
  .fill-arrow.dir-R:hover { transform: translateY(-50%) scale(1.3); }

  .win-banner { font-family: var(--font-display); font-size: 1.25rem; color: var(--color-positive); font-weight: 800; margin-top: var(--space-200); text-align: center; text-transform: uppercase; letter-spacing: 1px; }


  /* How it works carousel */
  .help-carousel { display: flex; flex-direction: column; gap: var(--space-400); width: 100%; overflow: hidden; }
  .help-slides { display: flex; overflow: hidden; width: 100%; }
  .help-slide { min-width: 100%; display: flex; flex-direction: column; align-items: center; gap: var(--space-300); transition: transform var(--duration-slow) var(--ease-enter); }
  .slide-visual { width: 280px; height: 180px; background: var(--color-bg-elevated); border-radius: var(--radius-lg); corner-shape: squircle; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-200); border: 1px solid var(--color-border-default); }
  .slide-visual i { font-size: 48px; color: var(--color-text-faint); }
  .slide-visual-label { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.08em; }
  .slide-title { font-family: var(--font-body); font-size: 14px; font-weight: 700; color: var(--color-text-primary); text-align: center; }
  .slide-desc { font-family: var(--font-body); font-size: 12px; color: var(--color-text-secondary); text-align: center; line-height: 1.5; max-width: 300px; padding: 0 var(--space-200); }
  .slide-desc strong { font-weight: 700; color: var(--color-text-primary); }
  .slide-desc .kw-mem { color: var(--color-brand-magenta); }
  .slide-desc .kw-star { color: var(--color-brand-yellow); }
  .slide-desc .kw-pos { color: var(--color-positive); }
  .slide-desc .kw-rare { color: var(--rarity-rare); }
  .slide-desc .kw-epic { color: var(--rarity-epic); }
  .slide-desc .kw-leg { color: var(--rarity-legendary); }
  .slide-desc .kw-myth { color: var(--color-danger); }
  .help-nav { display: flex; align-items: center; justify-content: center; gap: var(--space-300); }
  .help-arrow { width: 32px; height: 32px; border-radius: var(--radius-full); corner-shape: squircle; border: 1px solid var(--color-border-default); background: var(--color-bg-elevated); color: var(--color-text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all var(--duration-fast) var(--ease-enter); flex-shrink: 0; }
  .help-arrow:hover { border-color: var(--color-brand-magenta); color: var(--color-text-primary); }
  .help-arrow:disabled { opacity: 0.2; pointer-events: none; }
  .help-dots { display: flex; gap: var(--space-100); align-items: center; }
  .help-dot { width: 8px; height: 8px; border-radius: var(--radius-full); background: var(--color-text-faint); cursor: pointer; transition: background var(--duration-fast) var(--ease-enter); }
  .help-dot.active { background: var(--color-brand-magenta); }
  .help-counter { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.08em; }
  .slide-btn { padding: var(--space-200) var(--space-400); background: var(--color-brand-magenta); color: var(--color-text-primary); border: none; border-radius: var(--radius-lg); corner-shape: squircle; font-family: var(--font-body); font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity var(--duration-fast) var(--ease-enter); margin-top: var(--space-100); }

  /* Exchange modal */
  .exchange-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 910; align-items: center; justify-content: center; }
  .exchange-modal.open { display: flex; }

  .exchange-section-label { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: var(--space-100); }

  .exchange-confirm:disabled { opacity: 0.3; pointer-events: none; }
  .exchange-result { display: flex; align-items: center; justify-content: center; gap: var(--space-300); padding: var(--space-300); background: var(--color-bg-page); border-radius: var(--radius-lg); corner-shape: squircle; border: 1px solid var(--color-border-subtle); }

  /* Inventory count badges */
  .palette-item { position: relative; flex-direction: column; align-items: center; }
  .piece-count { font-family: var(--font-mono); font-size: 0.5625rem; color: var(--color-text-primary); font-weight: 700; pointer-events: none; letter-spacing: 0.02em; line-height: 1; margin-top: 2px; }
  .palette-item.depleted { opacity: 0.2; pointer-events: none; cursor: default; }

  /* Power-up used state */
  .powerup-item.used { opacity: 0.25; pointer-events: none; cursor: default; }
  .powerup-uses { font-family: var(--font-mono); font-size: 0.5625rem; color: var(--color-text-primary); font-weight: 700; margin-left: var(--space-100); }
  .powerup-item.used .powerup-uses { color: var(--color-danger); }

  @media (max-width: 600px) {
    .slide-visual { width: 100%; height: 140px; }
    .slide-title { font-size: 12px; }
    .slide-desc { font-size: 10px; max-width: 100%; }

    .help-dot { width: 6px; height: 6px; }
    .help-arrow { width: 28px; height: 28px; font-size: 10px; }
    .exchange-box { padding: var(--space-400); }
    .exchange-targets { flex-wrap: wrap; }
  }
</style>

<script>
// === SOUND MANAGER (Web Audio API — no external files) ===
const SoundManager = {
  ctx: null,
  enabled: true,
  init() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  tone(freq, type, duration, vol, freqEnd) {
    if (!this.ctx || !this.enabled) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
    if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, this.ctx.currentTime + duration);
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime + duration);
  },
  noise(duration, vol) {
    if (!this.ctx || !this.enabled) return;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * duration, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.setValueAtTime(2000, this.ctx.currentTime);
    filter.frequency.linearRampToValueAtTime(200, this.ctx.currentTime + duration);
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    src.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
    src.start(); src.stop(this.ctx.currentTime + duration);
  },
  place()   { this.tone(800, 'square', 0.06, 0.12); },
  connect() { this.tone(600, 'sine', 0.15, 0.18, 900); },
  remove()  { this.tone(200, 'triangle', 0.1, 0.12); },
  star()    { this.tone(800, 'sine', 0.3, 0.2, 1200); },
  complete() {
    this.tone(523, 'sine', 0.12, 0.18); // C5
    setTimeout(() => this.tone(659, 'sine', 0.12, 0.18), 120); // E5
    setTimeout(() => this.tone(784, 'sine', 0.25, 0.22), 240); // G5
  },
  powerup() { this.noise(0.2, 0.12); },
  error()   { this.tone(150, 'sawtooth', 0.08, 0.08); }
};
// Init AudioContext on first user interaction
document.addEventListener('mousedown', () => SoundManager.init(), { once: true });
document.addEventListener('touchstart', () => SoundManager.init(), { once: true });

// === GAME STATE ===
let boardSize = 0;
let boardState = [];
let originalBoard = []; // immutable copy of loaded board for reset
let history = [];
let powerUpLinks = {}; // { "row,col" (source) -> ["row,col", ...] (generated pieces) }
let rotatedPieces = {}; // { "row,col": originalVariant }

function getVariantFamily(variant) {
  if (variant === 'green' || variant === 'green2') return ['green','green2'];
  if (variant.startsWith('blue')) return ['blue','blue2','blue3','blue4'];
  if (variant.startsWith('purple')) return ['purple','purple2','purple3','purple4'];
  return [variant]; // orange, red — single variant
}
let currentBoardFile = null;

// === INVENTORY SYSTEM (global, persists across boards) ===
const INITIAL_SUPPLY = 20;
const ALL_VARIANTS = ['green','green2','blue','blue2','blue3','blue4','purple','purple2','purple3','purple4','orange','red'];
let inventory = {};
ALL_VARIANTS.forEach(v => inventory[v] = INITIAL_SUPPLY);

function saveInventory() {
  localStorage.setItem('puzzle-inventory', JSON.stringify(inventory));
}
const INVENTORY_VERSION = 2; // bump when piece list changes
function loadInventory() {
  const ver = localStorage.getItem('puzzle-inventory-version');
  if (ver !== String(INVENTORY_VERSION)) {
    // Version mismatch — reset to defaults
    ALL_VARIANTS.forEach(v => inventory[v] = INITIAL_SUPPLY);
    localStorage.setItem('puzzle-inventory-version', INVENTORY_VERSION);
    saveInventory();
    localStorage.removeItem('puzzle-board-placements');
    boardPlacements = {};
    return;
  }
  const saved = localStorage.getItem('puzzle-inventory');
  if (saved) { try { inventory = JSON.parse(saved); } catch(e) {} }
  // Ensure any new variants get default supply
  ALL_VARIANTS.forEach(v => { if (inventory[v] === undefined) inventory[v] = INITIAL_SUPPLY; });
}
function consumePiece(variant) {
  if (!inventory.hasOwnProperty(variant) || inventory[variant] <= 0) return false;
  inventory[variant]--;
  saveInventory();
  return true;
}
function returnPiece(variant) {
  if (!inventory.hasOwnProperty(variant)) return;
  inventory[variant]++;
  saveInventory();
}

// === GRANTED REWARDS TRACKING ===
let grantedRewards = {}; // { boardFile: { maxStars: N, pieces: [{variant, count}] } }
function saveGrantedRewards() { localStorage.setItem('puzzle-granted-rewards', JSON.stringify(grantedRewards)); }
function loadGrantedRewards() { try { grantedRewards = JSON.parse(localStorage.getItem('puzzle-granted-rewards')||'{}'); } catch(e) { grantedRewards={}; } }

function uncompleteLevel(file) {
  const completed = getCompletedLevels();
  const idx = completed.indexOf(file);
  if (idx >= 0) { completed.splice(idx, 1); localStorage.setItem('puzzle-completed-levels', JSON.stringify(completed)); }
}

// Board data cache for cascade path checking
const boardDataCache = {};

// Reconstruct full board state from cached JSON + placements
function reconstructBoardState(file) {
  const data = boardDataCache[file];
  if (!data) return null;
  const size = data.metadata.boardSize;
  const state = Array.from({length:size}, ()=>Array(size).fill(null));
  for (let r=0;r<size;r++) for (let c=0;c<size;c++) {
    const cell = data.board[r]?.[c];
    if (!cell) continue;
    state[r][c] = {type:cell.type, color:cell.color};
    if (cell.variant) state[r][c].variant = cell.variant;
  }
  if (boardPlacements[file]) {
    for (const [key, piece] of Object.entries(boardPlacements[file])) {
      const [r, c] = key.split(',').map(Number);
      if (r < size && c < size && state[r][c] === null) state[r][c] = {...piece};
    }
  }
  return { state, size };
}

// Cascading reward removal: fix negative inventory by removing pieces from other boards
function cascadeRewardRemoval(excludeFile) {
  let changed = true;
  while (changed) {
    changed = false;
    // Fix any negative inventory by clawing back pieces from other boards
    for (const variant of ALL_VARIANTS) {
      while (inventory[variant] < 0) {
        let found = false;
        for (const file of Object.keys(boardPlacements)) {
          if (file === excludeFile) continue;
          const placements = boardPlacements[file];
          for (const [key, piece] of Object.entries(placements)) {
            if (piece.variant === variant) {
              delete placements[key];
              inventory[variant]++;
              found = true;
              break;
            }
          }
          if (found) break;
        }
        if (!found) { inventory[variant] = 0; break; } // safety: can't find piece, clamp
      }
    }
    // Check if any board lost its path connection
    for (const file of Object.keys(boardPlacements)) {
      if (file === excludeFile) continue;
      if (!getCompletedLevels().includes(file)) continue;
      const reconstructed = reconstructBoardState(file);
      if (!reconstructed) continue;
      const pathOk = findPathOnState(reconstructed.state, reconstructed.size);
      if (!pathOk) {
        // Board lost completion — remove its rewards
        uncompleteLevel(file);
        if (grantedRewards[file]) {
          (grantedRewards[file].pieces || grantedRewards[file] || []).forEach(r => { inventory[r.variant] -= r.count; });
          delete grantedRewards[file];
          clearBoardStars(file);
          changed = true; // may cause more negatives → loop again
        }
      }
    }
  }
  saveGrantedRewards(); saveInventory(); saveBoardPlacements();
}

// === BOARD PERSISTENCE (save player pieces per board) ===
let boardPlacements = {};
let boardRotations = {}; // { boardFile: { "row,col": originalVariant } }
function saveBoardPlacements() {
  localStorage.setItem('puzzle-board-placements', JSON.stringify(boardPlacements));
  localStorage.setItem('puzzle-board-rotations', JSON.stringify(boardRotations));
}
function loadBoardPlacements() {
  const saved = localStorage.getItem('puzzle-board-placements');
  if (saved) { try { boardPlacements = JSON.parse(saved); } catch(e) {} }
  const savedRot = localStorage.getItem('puzzle-board-rotations');
  if (savedRot) { try { boardRotations = JSON.parse(savedRot); } catch(e) {} }
}
function saveCurrentBoard() {
  if (!currentBoardFile) return;
  const placements = {};
  for (let r=0; r<boardSize; r++) for (let c=0; c<boardSize; c++) {
    const cell = boardState[r][c];

  if (currentBoardFile) {

// Remove a player piece and all power-up generated pieces linked to it
function removePieceWithLinks(row, col) {
  SoundManager.remove();
  const key = row+','+col;
  // Return piece to inventory (original variant if rotated)
  const cell = boardState[row][col];
  if (cell && cell.type === 'piece' && cell.variant) {
    if (rotatedPieces[key]) {
      returnPiece(rotatedPieces[key]); // return original variant
      powerUpUses.rotate = Math.max(0, powerUpUses.rotate - 1); // refund power-up
      if (currentBoardFile && boardPowerUpsUsed[currentBoardFile]) {
        boardPowerUpsUsed[currentBoardFile] = boardPowerUpsUsed[currentBoardFile].filter(t => t !== 'rotate');
      }
      savePowerUpUses();
      delete rotatedPieces[key];
      updatePowerUpUI();
    } else {
      returnPiece(cell.variant);
    }
  }
  // Remove the piece — if it was a red Breaker, restore the obstacle
  history.push({row, col, prev: cell});
  if (cell && cell.variant === 'red') {
    boardState[row][col] = {type:'obstacle', color:'black'};
  } else {
    boardState[row][col] = null;
  }
  // Remove all linked generated pieces and refund the power-up
  if (powerUpLinks[key]) {
    // Determine which power-up type was used by checking the link pattern
    const linkCount = powerUpLinks[key].length;
    for (const linkedKey of powerUpLinks[key]) {
      const [lr, lc] = linkedKey.split(',').map(Number);
      if (boardState[lr][lc] && boardState[lr][lc].type === 'preset') {
        history.push({row: lr, col: lc, prev: boardState[lr][lc]});
        boardState[lr][lc] = null;
      }
    }
    // Refund the power-up used on this piece
    const puTypes = ['fill', 'extend', 'teleport'];
    if (currentBoardFile && boardPowerUpsUsed[currentBoardFile]) {
      for (const t of puTypes) {
        const idx = boardPowerUpsUsed[currentBoardFile].indexOf(t);
        if (idx >= 0 && powerUpUses[t] > 0) {
          powerUpUses[t]--;
          boardPowerUpsUsed[currentBoardFile].splice(idx, 1);
          savePowerUpUses();
          updatePowerUpUI();
          break;
        }
      }
    }
    delete powerUpLinks[key];
  }
  saveCurrentBoard();
  updateInventoryUI();
}

function findPresetVariant(needed, forbidden) {
  const presets = [
    {id:'white',sides:['T','B']},{id:'white2',sides:['L','R']},
    {id:'white3',sides:['L','T']},{id:'white4',sides:['T','R']},
    {id:'white5',sides:['R','B']},{id:'white6',sides:['B','L']},
    {id:'white7',sides:['T','L','R']},{id:'white8',sides:['T','R','B']},
    {id:'white9',sides:['B','L','R']},{id:'white10',sides:['T','B','L']},
    {id:'white11',sides:['T','R','B','L']},
  ];
  const neededSet = new Set(needed);
  const forbiddenSet = new Set(forbidden || []);
  const required = needed[0];
  let best = null, bestCov = -1, bestExt = 999;
  for (const p of presets) {
    if (!p.sides.includes(required)) continue;
    if (p.sides.some(s => forbiddenSet.has(s))) continue;
    const cov = p.sides.filter(s => neededSet.has(s)).length;
    const ext = p.sides.filter(s => !neededSet.has(s)).length;
    if (cov > bestCov || (cov === bestCov && ext < bestExt)) { bestCov=cov; bestExt=ext; best=p.id; }
  }
  return best || 'white11';
}

function computeFillPath(row, col, dir) {
  const [dr,dc] = DIR_DELTA[dir]; const path = [];
  let r = row+dr, c = col+dc;
  while (r>=0 && r<boardSize && c>=0 && c<boardSize) {
    if (boardState[r][c] !== null) break;
    path.push({row:r,col:c}); r+=dr; c+=dc;
  }
  return path;
}

function getConnectedCells() {
  const connected = new Set();
  for (let r=0; r<boardSize; r++) for (let c=0; c<boardSize; c++) {
    const cell = boardState[r][c];
    if (!cell || !cell.variant) continue;
    const sides = CONNECTORS[cell.variant]; if (!sides) continue;
    for (const dir of ['T','B','L','R']) {
      if (!sides.includes(dir)) continue;
      const [dr,dc] = DIR_DELTA[dir]; const nr=r+dr, nc=c+dc;
      if (nr<0||nr>=boardSize||nc<0||nc>=boardSize) continue;
      const n = boardState[nr][nc];
      // Direct connection
      if (n && n.variant) {
        const ns = CONNECTORS[n.variant];
        if (ns && ns.includes(OPPOSITE[dir])) { connected.add(`${r},${c}`); connected.add(`${nr},${nc}`); }
        continue;
      }
      // Teleport connection: check all sides of adjacent obstacle for connectable pieces
      if (n && n.type==='obstacle') {
        for (const exitDir of ['T','B','L','R']) {
          const [edr,edc]=DIR_DELTA[exitDir]; const er=nr+edr, ec=nc+edc;
          if (er===r&&ec===c) continue;
          if (er<0||er>=boardSize||ec<0||ec>=boardSize) continue;
          const exitCell=boardState[er][ec];
          if (!exitCell||!exitCell.variant) continue;
          const exitSides=CONNECTORS[exitCell.variant];
          if (exitSides&&exitSides.includes(OPPOSITE[exitDir])) {
            connected.add(`${r},${c}`); connected.add(`${er},${ec}`);
          }
        }
      }
    }
  }
  return connected;
}

function getConnectedSides() {
  const sides = {}; // { "r,c": Set(['T','B',...]) }
  for (let r=0; r<boardSize; r++) for (let c=0; c<boardSize; c++) {
    const cell = boardState[r][c];
    if (!cell || !cell.variant) continue;
    const cellSides = CONNECTORS[cell.variant]; if (!cellSides) continue;
    for (const dir of ['T','B','L','R']) {
      if (!cellSides.includes(dir)) continue;
      const [dr,dc] = DIR_DELTA[dir]; const nr=r+dr, nc=c+dc;
      if (nr<0||nr>=boardSize||nc<0||nc>=boardSize) continue;
      const n = boardState[nr][nc];
      if (n && n.variant) {
        const ns = CONNECTORS[n.variant];
        if (ns && ns.includes(OPPOSITE[dir])) {
          const key = r+','+c;
          if (!sides[key]) sides[key] = new Set();
          sides[key].add(dir);
          const nkey = nr+','+nc;
          if (!sides[nkey]) sides[nkey] = new Set();
          sides[nkey].add(OPPOSITE[dir]);
        }
      }
      // Through-obstacle connections
      if (n && n.type==='obstacle') {
        for (const exitDir of ['T','B','L','R']) {
          const [edr,edc]=DIR_DELTA[exitDir]; const er=nr+edr, ec=nc+edc;
          if (er===r&&ec===c) continue;
          if (er<0||er>=boardSize||ec<0||ec>=boardSize) continue;
          const exitCell=boardState[er][ec];
          if (!exitCell||!exitCell.variant) continue;
          const exitSides=CONNECTORS[exitCell.variant];
          if (exitSides&&exitSides.includes(OPPOSITE[exitDir])) {
            const key = r+','+c;
            if (!sides[key]) sides[key] = new Set();
            sides[key].add(dir);
            const ekey = er+','+ec;
            if (!sides[ekey]) sides[ekey] = new Set();
            sides[ekey].add(OPPOSITE[exitDir]);
          }
        }
      }
    }
  }
  return sides;
}

      if (nr<0||nr>=boardSize||nc<0||nc>=boardSize) { forbidden.push(s); continue; }

    const path=computeFillPath(this.target.row,this.target.col,dir);
    const generated = [];
    for (let i=0;i<path.length;i++) { const {row,col}=path[i]; const v=this._variant(dir,i===path.length-1,row,col);
      history.push({row,col,prev:boardState[row][col]}); boardState[row][col]={type:'preset',color:'white',variant:v};
      generated.push(row+','+col);
    }
    if (!powerUpLinks[srcKey]) powerUpLinks[srcKey] = [];
    powerUpLinks[srcKey].push(...generated);
    usePowerUp('fill'); saveCurrentBoard();
    PowerUpManager.active=null; this.cancel(); renderBoard(); updateStatus(); checkStars();
  },
  cancel() {this.target=null;this.directions=[];this.previewDir=null;},
  canActivate(t) { const c=boardState[t.row][t.col]; if (!c||c.type!=='piece') return false; return c.variant&&CONNECTORS[c.variant]&&CONNECTORS[c.variant].some(d=>computeFillPath(t.row,t.col,d).length>0); }
};

const ExtendPowerUp = {
  target:null, cells:[], previewClass:'extend-preview',
  activate(t) {
    this.target={row:t.row,col:t.col}; const sides=CONNECTORS[boardState[t.row][t.col].variant]; this.cells=[];
    for (const dir of sides) { const [dr,dc]=DIR_DELTA[dir]; const nr=t.row+dr,nc=t.col+dc;
      if (nr>=0&&nr<boardSize&&nc>=0&&nc<boardSize&&boardState[nr][nc]===null) this.cells.push({row:nr,col:nc,dir});
    }
  },
  _variant(row,col,fromDir) {
    const inc=OPPOSITE[fromDir], needed=[inc], forbidden=[];
    for (const s of ['T','B','L','R']) { if (s===inc) continue; const [dr,dc]=DIR_DELTA[s]; const nr=row+dr,nc=col+dc;
      if (nr<0||nr>=boardSize||nc<0||nc>=boardSize) { forbidden.push(s); continue; }
      const adj=boardState[nr][nc];
      if (adj===null) { needed.push(s); continue; }
      if (adj.type==='obstacle') { forbidden.push(s); continue; }
      if (adj.variant&&CONNECTORS[adj.variant]&&CONNECTORS[adj.variant].includes(OPPOSITE[s])) needed.push(s);
      else forbidden.push(s);
    } return findPresetVariant(needed,forbidden);
  },
  renderCell(cell,r,c) {
    if (this.target&&this.target.row===r&&this.target.col===c) cell.classList.add('powerup-target');
    for (const ec of this.cells) if (ec.row===r&&ec.col===c) {
      const v=this._variant(r,c,ec.dir); cell.classList.add('extend-preview');
      if (PIECE_SVGS[v]) {cell.classList.add('cell-svg');cell.innerHTML=PIECE_SVGS[v];cell.style.opacity='0.5';}
      cell.addEventListener('click',e=>{e.stopPropagation();this.execute();});
    }
  },
  execute() {
    const srcKey = this.target.row+','+this.target.col;
    const generated = [];
    for (const {row,col,dir} of this.cells) { const v=this._variant(row,col,dir);
      history.push({row,col,prev:boardState[row][col]}); boardState[row][col]={type:'preset',color:'white',variant:v};
      generated.push(row+','+col);
    }
    if (!powerUpLinks[srcKey]) powerUpLinks[srcKey] = [];
    powerUpLinks[srcKey].push(...generated);
    usePowerUp('extend'); saveCurrentBoard();
    PowerUpManager.active=null; this.cancel(); renderBoard(); updateStatus(); checkStars();
  },
  cancel() {this.target=null;this.cells=[];},
  canActivate(t) { const c=boardState[t.row][t.col]; if (!c||c.type!=='piece'||!c.variant||!CONNECTORS[c.variant]) return false;
    return CONNECTORS[c.variant].some(d=>{const [dr,dc]=DIR_DELTA[d];const nr=t.row+dr,nc=t.col+dc;return nr>=0&&nr<boardSize&&nc>=0&&nc<boardSize&&boardState[nr][nc]===null;});
  }
};

const TeleportPowerUp = {
  target:null, directions:[], previewDir:null, previewClass:'teleport-preview',
  activate(t) {
    this.target={row:t.row,col:t.col}; this.previewDir=null;
    const sides=CONNECTORS[boardState[t.row][t.col].variant]; this.directions=[];
    const seen=new Set();
    for (const dir of sides) { const [dr,dc]=DIR_DELTA[dir]; const nr=t.row+dr,nc=t.col+dc;
      if (nr<0||nr>=boardSize||nc<0||nc>=boardSize) continue;
      const neighbor=boardState[nr][nc]; if (!neighbor||(neighbor.type!=='preset'&&neighbor.type!=='obstacle')) continue;
      const obsKey=nr+','+nc; if (seen.has(obsKey)) continue; seen.add(obsKey);
      for (const exitDir of ['T','B','L','R']) {
        const [edr,edc]=DIR_DELTA[exitDir]; const er=nr+edr,ec=nc+edc;
        if (er===t.row&&ec===t.col) continue;
        if (er<0||er>=boardSize||ec<0||ec>=boardSize) continue;
        if (boardState[er][ec]===null) { const key=obsKey+':'+exitDir; if (!seen.has(key)) { seen.add(key);
          this.directions.push({exitDir,obstacleRow:nr,obstacleCol:nc,landingRow:er,landingCol:ec}); } }
      }
    }
  },
  _computeLanding(exitDir,obsR,obsC,landR,landC) {
    const inc=OPPOSITE[exitDir],needed=[inc],forbidden=[];
    for (const s of ['T','B','L','R']) { if (s===inc) continue; const [sdr,sdc]=DIR_DELTA[s]; const snr=landR+sdr,snc=landC+sdc;
      if (snr<0||snr>=boardSize||snc<0||snc>=boardSize){forbidden.push(s);continue;} const adj=boardState[snr][snc];
      if (adj===null){needed.push(s);continue;} if (adj.type==='obstacle'){forbidden.push(s);continue;}
      if (adj.variant&&CONNECTORS[adj.variant]&&CONNECTORS[adj.variant].includes(OPPOSITE[s])) needed.push(s); else forbidden.push(s);
    } return {row:landR,col:landC,variant:findPresetVariant(needed,forbidden)};
  },
  renderCell(cell,r,c) {
    const isMobile = window.innerWidth <= 600;
    if (this.target&&this.target.row===r&&this.target.col===c) cell.classList.add('powerup-target');
    // Desktop: arrows on obstacles, hover to preview. Mobile: show all landings directly.
    if (!isMobile) {
      for (let i=0;i<this.directions.length;i++) { const d=this.directions[i];
        if (d.obstacleRow===r&&d.obstacleCol===c) {
          const arrow=document.createElement('div'); arrow.className='fill-arrow dir-'+d.exitDir; arrow.innerHTML=DIR_ARROWS[d.exitDir];
          arrow.style.zIndex='10'; const idx=i;
          arrow.addEventListener('mouseenter',()=>{this._previewIdx=idx;renderBoard();});
          arrow.addEventListener('click',e=>{e.stopPropagation();this._executeIdx(idx);});
          cell.appendChild(arrow);
        }
      }
      if (this._previewIdx!=null&&this.directions[this._previewIdx]) {
        const d=this.directions[this._previewIdx];
        const landing=this._computeLanding(d.exitDir,d.obstacleRow,d.obstacleCol,d.landingRow,d.landingCol);
        if (landing.row===r&&landing.col===c) {
          cell.classList.add('teleport-preview');
          if (PIECE_SVGS[landing.variant]) {cell.classList.add('cell-svg');cell.innerHTML=PIECE_SVGS[landing.variant];cell.style.opacity='0.5';}
          cell.style.cursor='pointer'; const idx=this._previewIdx;
          cell.addEventListener('click',e=>{e.stopPropagation();this._executeIdx(idx);});
        }
      }
    } else {
      // Mobile: show ALL landing cells directly, tap to execute
      for (let i=0;i<this.directions.length;i++) { const d=this.directions[i];
        const landing=this._computeLanding(d.exitDir,d.obstacleRow,d.obstacleCol,d.landingRow,d.landingCol);
        if (landing.row===r&&landing.col===c) {
          cell.classList.add('teleport-preview');
          if (PIECE_SVGS[landing.variant]) {cell.classList.add('cell-svg');cell.innerHTML=PIECE_SVGS[landing.variant];cell.style.opacity='0.4';}
          cell.style.cursor='pointer'; const idx=i;
          cell.addEventListener('click',e=>{e.stopPropagation();this._executeIdx(idx);});
          cell.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();this._executeIdx(idx);},{passive:false});
        }
      }
    }
  },
  _executeIdx(idx) {
    const d=this.directions[idx]; if (!d) return;
    const srcKey = this.target.row+','+this.target.col;
    const landing=this._computeLanding(d.exitDir,d.obstacleRow,d.obstacleCol,d.landingRow,d.landingCol);
    history.push({row:landing.row,col:landing.col,prev:boardState[landing.row][landing.col]});
    boardState[landing.row][landing.col]={type:'preset',color:'white',variant:landing.variant};
    if (!powerUpLinks[srcKey]) powerUpLinks[srcKey] = [];
    powerUpLinks[srcKey].push(landing.row+','+landing.col);
    usePowerUp('teleport'); saveCurrentBoard();
    PowerUpManager.active=null; this.cancel(); renderBoard(); updateStatus(); checkStars();
  },
  cancel() {this.target=null;this.directions=[];this.previewDir=null;this._previewIdx=null;},
  canActivate(t) { const c=boardState[t.row][t.col]; if (!c||c.type!=='piece'||!c.variant||!CONNECTORS[c.variant]) return false;
    return CONNECTORS[c.variant].some(d=>{const [dr,dc]=DIR_DELTA[d];const nr=t.row+dr,nc=t.col+dc;if(nr<0||nr>=boardSize||nc<0||nc>=boardSize)return false;const n=boardState[nr][nc];return n&&(n.type==='preset'||n.type==='obstacle');});
  }
};

const RotatePowerUp = {
  target: null,
  selectorEl: null,
  activate(t) {
    this.target = { row: t.row, col: t.col };
    const state = boardState[t.row][t.col];
    const family = getVariantFamily(state.variant);
    const others = family.filter(v => v !== state.variant);
    if (others.length === 0) { this.cancel(); return; }
    // Defer selector until after PowerUpManager's renderBoard() rebuilds the DOM
    this._pendingVariants = others;
  },
  _showSelector(row, col, variants) {
    this._removeSelector();
    const sel = document.createElement('div');
    sel.className = 'rotate-selector';
    variants.forEach(v => {
      const btn = document.createElement('div');
      btn.className = 'rotate-option';
      btn.innerHTML = PIECE_SVGS[v] || '';
      btn.addEventListener('click', e => { e.stopPropagation(); this.execute(v); });
      btn.addEventListener('touchend', e => { e.preventDefault(); e.stopPropagation(); this.execute(v); });
      sel.appendChild(btn);
    });
    // Position near the target cell
    const cellEl = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
    if (cellEl) {
      const board = document.getElementById('board');
      const boardRect = board.getBoundingClientRect();
      const cellRect = cellEl.getBoundingClientRect();
      sel.style.left = (cellRect.left - boardRect.left) + 'px';
      sel.style.top = (cellRect.bottom - boardRect.top + 4) + 'px';
      board.style.position = 'relative';
      board.appendChild(sel);
      // Adjust if overflows right
      requestAnimationFrame(() => {
        const selRect = sel.getBoundingClientRect();
        if (selRect.right > boardRect.right) {
          sel.style.left = (boardRect.width - sel.offsetWidth) + 'px';
        }
      });
    }
    this.selectorEl = sel;
  },
  _removeSelector() {
    if (this.selectorEl) { this.selectorEl.remove(); this.selectorEl = null; }
  },
  execute(newVariant) {
    const { row, col } = this.target;
    const state = boardState[row][col];
    const key = row + ',' + col;
    // Track original variant (only if not already rotated)
    if (!rotatedPieces[key]) rotatedPieces[key] = state.variant;
    // Transform piece
    const colorMap = { green2:'green', blue2:'blue', blue3:'blue', blue4:'blue', purple2:'purple', purple3:'purple', purple4:'purple' };
    boardState[row][col] = { type: 'piece', color: colorMap[newVariant] || newVariant, variant: newVariant };
    usePowerUp('rotate');
    saveCurrentBoard();
    this._removeSelector();
    PowerUpManager.active = null;
    this.target = null;
    renderBoard(); updateStatus(); checkStars();
  },
  renderCell(cell, r, c) {
    if (this.target && this.target.row === r && this.target.col === c) {
      cell.classList.add('powerup-target');
      // Show selector after DOM is ready (deferred from activate)
      if (this._pendingVariants) {
        const variants = this._pendingVariants;
        this._pendingVariants = null;
        requestAnimationFrame(() => this._showSelector(r, c, variants));
      }
    }
  },
  cancel() { this._removeSelector(); this.target = null; this._pendingVariants = null; },
  canActivate(t) {
    const c = boardState[t.row][t.col];
    if (!c || c.type !== 'piece' || !c.variant) return false;
    return getVariantFamily(c.variant).length > 1;
  }
};

const powerUpMap = { fill: FillPowerUp, extend: ExtendPowerUp, teleport: TeleportPowerUp, rotate: RotatePowerUp };

// === BOARD LOADING ===
async function loadBoardFile(file) {
  currentBoardFile = file;
  const resp = await fetch(file);
  const data = await resp.json();
  boardDataCache[file] = data; // cache for cascade checks
  boardSize = data.metadata.boardSize;
  boardState = Array.from({length:boardSize}, ()=>Array(boardSize).fill(null));
  for (let r=0;r<boardSize;r++) for (let c=0;c<boardSize;c++) {
    const cell = data.board[r]?.[c];
    if (!cell) continue;
    boardState[r][c] = {type:cell.type, color:cell.color};
    if (cell.variant) boardState[r][c].variant = cell.variant;
  }
  originalBoard = boardState.map(row => row.map(cell => cell ? {...cell} : null));
  calcMinPathScore(); // Calculate minimum path score for star thresholds
  // Restore saved player placements for this board
  if (boardPlacements[file]) {
    for (const [key, piece] of Object.entries(boardPlacements[file])) {
      const [r, c] = key.split(',').map(Number);
      if (r < boardSize && c < boardSize && boardState[r][c] === null) {
        boardState[r][c] = {...piece};
      }
    }
  }
  history = [];
  powerUpLinks = {};
  rotatedPieces = boardRotations[file] ? {...boardRotations[file]} : {};
  document.querySelectorAll('.board-card').forEach(c => c.classList.remove('active'));
  event?.target?.closest?.('.board-card')?.classList?.add('active');
  document.getElementById('stat-level').textContent = data.metadata.name;
  renderBoard(); updateStatus(); checkStars(); updateInventoryUI(); updatePowerUpUI();
  document.getElementById('win-banner').innerHTML = '';
}

let adminUnlocked = false;
function toggleAdminUnlock() {
  adminUnlocked = !adminUnlocked;
  const btn = document.getElementById('admin-unlock');
  if (adminUnlocked) {
    // Grant 99 stars to unlock everything
    BOARDS.forEach(b => saveBoardStars(b.file, 3));
    BOARDS.forEach(b => markLevelCompleted(b.file));
    btn.style.borderColor = 'var(--color-positive)';
    btn.style.color = 'var(--color-positive)';
    btn.innerHTML = '<i class="fa-solid fa-lock-open"></i>';
  } else {
    // Remove all stars and completions
    BOARDS.forEach(b => { clearBoardStars(b.file); uncompleteLevel(b.file); });
    btn.style.borderColor = 'var(--color-border-default)';
    btn.style.color = 'var(--color-text-faint)';
    btn.innerHTML = '<i class="fa-solid fa-lock"></i>';
  }
  // Re-render level selector
  const container = document.getElementById('board-selector');
  container.innerHTML = '';
  initBoardSelector();
}
